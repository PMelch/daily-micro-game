<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm Relay 🥁</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .back-bar {
      width: 100%;
      background: #0a0a1a;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #333;
    }
    .back-bar a {
      color: #ffcc00;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: system-ui, sans-serif;
    }
    .back-bar a:hover { text-decoration: underline; }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 1rem;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; flex-direction: column; align-items: center; gap: 1rem; max-width: 480px; width: 100%; }
    .screen.active { display: flex; }

    h1 {
      font-size: 2.5rem;
      text-align: center;
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ffe66d, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #aaa; text-align: center; font-size: 0.95rem; }

    /* Player count */
    .player-count-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .count-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #555;
      background: #1a1a2e;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .count-btn:hover { border-color: #ffcc00; }
    #player-count-display {
      font-size: 1.4rem;
      font-weight: bold;
      min-width: 30px;
      text-align: center;
    }

    /* Name inputs */
    .name-inputs { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
    .name-input-row { display: flex; align-items: center; gap: 0.5rem; }
    .player-icon { font-size: 1.3rem; }
    .name-input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
    }
    .name-input:focus { outline: none; border-color: #ffcc00; }

    /* Buttons */
    .btn {
      padding: 0.8rem 2rem;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4ecdc4, #45b7d1);
      color: #0a0a1a;
    }
    .btn-primary:hover { transform: scale(1.03); }
    .btn-danger {
      background: #ff6b6b;
      color: #fff;
    }
    .btn-secondary {
      background: #2d2d4e;
      color: #fff;
      border: 1px solid #555;
    }
    .btn-secondary:hover { border-color: #ffcc00; }

    /* ===== GAME SCREEN ===== */
    .player-header {
      text-align: center;
      font-size: 1.1rem;
      color: #aaa;
    }
    .player-name-big {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ffcc00;
      text-align: center;
    }

    /* Lives */
    .lives-row { display: flex; gap: 0.3rem; justify-content: center; }
    .life-icon { font-size: 1.2rem; }

    /* Sequence display (small dots showing the beat history) */
    .sequence-track {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      min-height: 32px;
      align-items: center;
    }
    .seq-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      transition: transform 0.1s;
    }
    .seq-dot.new { transform: scale(1.4); box-shadow: 0 0 8px currentColor; }

    /* Round display */
    .round-info { color: #888; font-size: 0.9rem; text-align: center; }

    /* Phase banner */
    .phase-banner {
      font-size: 1.1rem;
      text-align: center;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-weight: bold;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phase-watch { background: #2d1b4e; color: #a29bfe; }
    .phase-repeat { background: #1a3a2a; color: #4ecdc4; }
    .phase-add { background: #3a2a1a; color: #ffe66d; }
    .phase-transition { background: #1a1a2e; color: #aaa; }

    /* Beat buttons */
    .beats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 340px;
    }
    .beat-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 20px;
      border: 3px solid transparent;
      font-size: 3.5rem;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }
    .beat-btn:disabled { cursor: not-allowed; opacity: 0.4; }
    .beat-btn:not(:disabled):hover { transform: scale(1.04); }
    .beat-btn:not(:disabled):active { transform: scale(0.96); }
    .beat-btn.lit {
      background: var(--beat-color) !important;
      box-shadow: 0 0 40px var(--beat-color);
      transform: scale(0.97);
    }
    .beat-btn.correct-flash {
      background: #22ff88 !important;
      box-shadow: 0 0 30px #22ff88;
    }
    .beat-btn.wrong-flash {
      background: #ff2244 !important;
      box-shadow: 0 0 30px #ff2244;
    }
    .beat-key {
      font-size: 0.8rem;
      opacity: 0.6;
      font-family: monospace;
    }

    /* Progress indicators during repeat */
    .input-progress {
      display: flex;
      gap: 6px;
      justify-content: center;
      min-height: 20px;
    }
    .progress-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #555;
    }
    .progress-dot.done { border-color: #4ecdc4; background: #4ecdc4; }
    .progress-dot.current { border-color: #ffcc00; animation: pulse 0.8s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .score-card {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      text-align: center;
      min-width: 70px;
    }
    .score-card.active-player {
      border-color: #ffcc00;
      box-shadow: 0 0 8px #ffcc0033;
    }
    .score-card .sc-name { font-size: 0.75rem; color: #888; }
    .score-card .sc-score { font-size: 1.3rem; font-weight: bold; }
    .score-card .sc-lives { font-size: 0.8rem; }

    /* Transition overlay */
    .transition-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .transition-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .transition-big { font-size: 3rem; text-align: center; }
    .transition-sub { font-size: 1.1rem; color: #aaa; text-align: center; padding: 0 1rem; }

    /* Game Over */
    .winner-badge {
      font-size: 4rem;
      animation: winner-spin 1s infinite linear;
    }
    @keyframes winner-spin {
      from { transform: rotate(-5deg); }
      to { transform: rotate(5deg); }
    }
    .final-scores { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 300px; }
    .final-score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .final-score-row.winner { border-color: #ffcc00; background: #2a2a0e; }
  </style>
</head>

    const i18n = initI18n(TRANSLATIONS);
    const { t, onLangChange } = i18n;

    // ===== GAME STATE =====
    const BEATS = [
      { id: 0, emoji: "🥁", color: "#ff6b6b", label: "DRUM" },
      { id: 1, emoji: "🎸", color: "#4ecdc4", label: "BASS" },
      { id: 2, emoji: "🎹", color: "#ffe66d", label: "KEYS" },
      { id: 3, emoji: "🎺", color: "#a29bfe", label: "HORN" },
    ];

    // Sounds via AudioContext
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration = 0.18, type = "triangle") {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0.35, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start();
        osc.stop(ctx.currentTime + duration + 0.01);
      } catch(e) {}
    }

    const BEAT_FREQS = [130, 196, 261, 349]; // C2, G2, C3, F3
    const BEAT_TYPES = ["sawtooth", "triangle", "sine", "square"];

    function playBeatSound(beatId) {
      playTone(BEAT_FREQS[beatId], 0.25, BEAT_TYPES[beatId]);
    }

    function playWrongSound() {
      playTone(80, 0.3, "sawtooth");
    }

    function playSuccessSound() {
      [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.15), i * 80));
    }

    // Game state
    let state = {
      players: [],
      activePlayers: [],  // players still in the game
      currentPlayerIdx: 0,
      sequence: [],
      round: 1,
      phase: "watch",     // watch | repeat | add | eliminated
      inputSoFar: [],
      scores: {},
      lives: {},
      showingSequence: false,
      animIdx: 0,
    };

    let playerCount = 2;

    // ===== SETUP =====
    const PLAYER_ICONS = ["🎵", "🎶", "🎸", "🥁"];

    function renderNameInputs() {
      const container = document.getElementById("name-inputs");
      container.innerHTML = "";
      for (let i = 0; i < playerCount; i++) {
        const row = document.createElement("div");
        row.className = "name-input-row";
        const icon = document.createElement("span");
        icon.className = "player-icon";
        icon.textContent = PLAYER_ICONS[i];
        const input = document.createElement("input");
        input.type = "text";
        input.className = "name-input";
        input.id = `player-name-${i}`;
        input.placeholder = `${t("defaultPlayer")} ${i + 1}`;
        input.value = input.placeholder;
        input.addEventListener("focus", () => { if (input.value === input.placeholder) input.value = ""; });
        input.addEventListener("blur", () => { if (!input.value.trim()) input.value = input.placeholder; });
        row.appendChild(icon);
        row.appendChild(input);
        container.appendChild(row);
      }
    }

    document.getElementById("btn-less").addEventListener("click", () => {
      if (playerCount > 2) { playerCount--; updateCountDisplay(); renderNameInputs(); }
    });
    document.getElementById("btn-more").addEventListener("click", () => {
      if (playerCount < 4) { playerCount++; updateCountDisplay(); renderNameInputs(); }
    });
    function updateCountDisplay() {
      document.getElementById("player-count-display").textContent = playerCount;
    }

    onLangChange(() => { renderNameInputs(); });
    renderNameInputs();

    document.getElementById("btn-start").addEventListener("click", startGame);

    function getPlayerNames() {
      return Array.from({ length: playerCount }, (_, i) => {
        const val = document.getElementById(`player-name-${i}`).value.trim();
        return val || `${t("defaultPlayer")} ${i + 1}`;
      });
    }

    function startGame() {
      const players = getPlayerNames();
      state.players = [...players];
      state.activePlayers = [...players];
      state.scores = {};
      state.lives = {};
      players.forEach(p => { state.scores[p] = 0; state.lives[p] = 3; });
      state.sequence = [];
      state.round = 1;
      state.currentPlayerIdx = 0;
      state.inputSoFar = [];

      showScreen("game");
      buildBeatsGrid();
      beginTurn();
    }

    // ===== SCREENS =====
    function showScreen(name) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(`screen-${name}`).classList.add("active");
    }

    // ===== GAME FLOW =====
    function currentPlayer() {
      return state.activePlayers[state.currentPlayerIdx];
    }

    function beginTurn() {
      const player = currentPlayer();
      document.getElementById("current-player-name").textContent = player;
      updateScoreboard();

      // Show transition overlay (pass device)
      showTransition(
        `🎵 ${player}`,
        t("passDeviceSub"),
        () => {
          // Player confirmed they're ready — show sequence
          startWatchPhase();
        }
      );
    }

    function startWatchPhase() {
      state.phase = "watch";
      state.inputSoFar = [];
      setPhaseBanner("watch");
      setBeatsEnabled(false);
      renderSequenceTrack(false);
      updateProgressDots();
      document.getElementById("current-player-name").textContent = currentPlayer();

      // Animate the sequence
      animateSequence(state.sequence, () => {
        // After showing sequence, enter repeat phase
        state.phase = "repeat";
        setPhaseBanner("repeat");
        setBeatsEnabled(true);
        updateProgressDots();
      });
    }

    function animateSequence(sequence, onDone) {
      if (sequence.length === 0) {
        // First turn: nothing to show, go straight to add
        state.phase = "add";
        setPhaseBanner("add");
        setBeatsEnabled(true);
        return;
      }

      let i = 0;
      const delay = Math.max(300, 600 - sequence.length * 20); // speed up as sequence grows

      function step() {
        if (i < sequence.length) {
          const beatId = sequence[i];
          lightUpBeat(beatId, () => {
            // highlight the dot
            renderSequenceTrack(false, i);
            i++;
            setTimeout(step, delay);
          });
        } else {
          setTimeout(onDone, 200);
        }
      }
      setTimeout(step, 400);
    }

    function lightUpBeat(beatId, onDone, duration = 450) {
      playBeatSound(beatId);
      const btn = document.getElementById(`beat-btn-${beatId}`);
      if (btn) {
        btn.classList.add("lit");
        setTimeout(() => {
          btn.classList.remove("lit");
          setTimeout(onDone, 80);
        }, duration);
      } else {
        onDone();
      }
    }

    function handleBeatPress(beatId) {
      if (state.phase === "repeat") {
        handleRepeatInput(beatId);
      } else if (state.phase === "add") {
        handleAddInput(beatId);
      }
    }

    function handleRepeatInput(beatId) {
      const pos = state.inputSoFar.length;
      const expected = state.sequence[pos];

      lightUpBeat(beatId, () => {}, 200);

      if (beatId === expected) {
        state.inputSoFar = [...state.inputSoFar, beatId];
        updateProgressDots();

        if (state.inputSoFar.length === state.sequence.length) {
          // Finished repeating! Now add new beat
          setBeatsEnabled(false);
          setTimeout(() => {
            state.phase = "add";
            setPhaseBanner("add");
            setBeatsEnabled(true);
          }, 300);
        }
      } else {
        // Wrong beat! Flash red and lose a life
        setBeatsEnabled(false);
        const btn = document.getElementById(`beat-btn-${beatId}`);
        const correctBtn = document.getElementById(`beat-btn-${expected}`);
        if (btn) { btn.classList.add("wrong-flash"); setTimeout(() => btn.classList.remove("wrong-flash"), 600); }
        if (correctBtn) { setTimeout(() => { correctBtn.classList.add("lit"); setTimeout(() => correctBtn.classList.remove("lit"), 400); }, 200); }
        playWrongSound();

        const player = currentPlayer();
        state.lives[player]--;
        updateScoreboard();

        setTimeout(() => {
          if (state.lives[player] <= 0) {
            eliminateCurrentPlayer();
          } else {
            // Show wrong feedback and restart the watch phase
            showTransition(
              `❌ ${t("wrongBeat")}`,
              `${t("lostLife")} ${state.lives[player]} ❤️ ${t("livesLabel")} ${t("livesLabel").repeat ? "" : ""}`,
              () => startWatchPhase()
            );
          }
        }, 800);
      }
    }

    function handleAddInput(beatId) {
      // Player is adding a new beat to the sequence
      lightUpBeat(beatId, () => {}, 200);
      state.sequence = [...state.sequence, beatId];
      state.scores[currentPlayer()]++;
      playSuccessSound();
      renderSequenceTrack(true);

      setBeatsEnabled(false);

      setTimeout(() => {
        advancePlayer();
      }, 600);
    }

    function advancePlayer() {
      const nextIdx = (state.currentPlayerIdx + 1) % state.activePlayers.length;
      if (nextIdx === 0 && state.activePlayers.length > 0) state.round++;
      state.currentPlayerIdx = nextIdx;
      state.inputSoFar = [];
      updateScoreboard();
      beginTurn();
    }

    function eliminateCurrentPlayer() {
      const player = currentPlayer();

      // Remove from active players
      state.activePlayers = state.activePlayers.filter(p => p !== player);

      if (state.activePlayers.length === 1) {
        // Game over!
        const winner = state.activePlayers[0];
        state.scores[winner] += 3; // bonus for surviving
        showTransition(
          `💀 ${player} ${t("noMoreLives")}`,
          `🏆 ${winner} ${t("winner")}`,
          showGameOver
        );
        return;
      }

      if (state.activePlayers.length === 0) {
        showGameOver();
        return;
      }

      // Adjust current index
      state.currentPlayerIdx = state.currentPlayerIdx % state.activePlayers.length;

      showTransition(
        `💀 ${player} ${t("noMoreLives")}`,
        `${t("activePlayers") || "Noch im Spiel"}: ${state.activePlayers.join(", ")}`,
        () => {
          state.inputSoFar = [];
          updateScoreboard();
          beginTurn();
        }
      );
    }

    // ===== UI HELPERS =====
    function setPhaseBanner(phase) {
      const banner = document.getElementById("phase-banner");
      banner.className = "phase-banner";
      if (phase === "watch") {
        banner.classList.add("phase-watch");
        banner.textContent = t("watchPhase");
      } else if (phase === "repeat") {
        banner.classList.add("phase-repeat");
        banner.textContent = t("repeatPhase");
      } else if (phase === "add") {
        banner.classList.add("phase-add");
        banner.textContent = t("addPhase");
      } else {
        banner.classList.add("phase-transition");
        banner.textContent = "";
      }
    }

    function updateScoreboard() {
      const board = document.getElementById("scoreboard");
      board.innerHTML = "";
      state.players.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "score-card";
        if (p === currentPlayer()) card.classList.add("active-player");

        const isElim = !state.activePlayers.includes(p);
        const livesHtml = isElim ? "💀" : "❤️".repeat(Math.max(0, state.lives[p] || 0));
        card.innerHTML = `
          <div class="sc-name">${p}</div>
          <div class="sc-score" style="${isElim ? "color:#555" : ""}">${state.scores[p] || 0}</div>
          <div class="sc-lives">${livesHtml}</div>
        `;
        board.appendChild(card);
      });

      // Round info
      document.getElementById("round-info").textContent =
        `${t("roundLabel")} ${state.round} · ${t("seqLength")} ${state.sequence.length} ${t("beats")}`;
    }

    function renderSequenceTrack(highlightLast = false, highlightIdx = -1) {
      const track = document.getElementById("sequence-track");
      track.innerHTML = "";
      state.sequence.forEach((beatId, i) => {
        const dot = document.createElement("div");
        dot.className = "seq-dot";
        if ((highlightLast && i === state.sequence.length - 1) || i === highlightIdx) {
          dot.classList.add("new");
        }
        dot.style.background = BEATS[beatId].color;
        dot.style.boxShadow = `0 0 4px ${BEATS[beatId].color}`;
        track.appendChild(dot);
      });
    }

    function updateProgressDots() {
      const container = document.getElementById("input-progress");
      container.innerHTML = "";
      if (state.phase !== "repeat") return;
      state.sequence.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "progress-dot";
        if (i < state.inputSoFar.length) dot.classList.add("done");
        else if (i === state.inputSoFar.length) dot.classList.add("current");
        container.appendChild(dot);
      });
    }

    function buildBeatsGrid() {
      const grid = document.getElementById("beats-grid");
      grid.innerHTML = "";
      BEATS.forEach(beat => {
        const btn = document.createElement("button");
        btn.className = "beat-btn";
        btn.id = `beat-btn-${beat.id}`;
        btn.style.setProperty("--beat-color", beat.color);
        btn.style.borderColor = beat.color + "44";
        btn.innerHTML = `<span style="font-size:3rem">${beat.emoji}</span><span class="beat-key">[${beat.id + 1}]</span>`;
        btn.disabled = true;
        btn.addEventListener("click", () => handleBeatPress(beat.id));
        btn.addEventListener("touchstart", (e) => {
          e.preventDefault();
          if (!btn.disabled) handleBeatPress(beat.id);
        }, { passive: false });
        grid.appendChild(btn);
      });
    }

    function setBeatsEnabled(enabled) {
      BEATS.forEach(b => {
        const btn = document.getElementById(`beat-btn-${b.id}`);
        if (btn) btn.disabled = !enabled;
      });
    }

    // Keyboard support
    document.addEventListener("keydown", e => {
      const map = { "1": 0, "2": 1, "3": 2, "4": 3 };
      if (e.key in map && !e.ctrlKey && !e.metaKey) {
        const beatId = map[e.key];
        const btn = document.getElementById(`beat-btn-${beatId}`);
        if (btn && !btn.disabled) handleBeatPress(beatId);
      }
    });

    // ===== TRANSITION OVERLAY =====
    let transitionCallback = null;
    document.getElementById("btn-ready").addEventListener("click", () => {
      hideTransition();
      if (transitionCallback) { const cb = transitionCallback; transitionCallback = null; cb(); }
    });

    function showTransition(big, sub, onReady) {
      document.getElementById("transition-text").textContent = big;
      document.getElementById("transition-sub").textContent = sub;
      document.getElementById("btn-ready").textContent = t("ready");
      transitionCallback = onReady;
      document.getElementById("transition-overlay").classList.add("show");
    }

    function hideTransition() {
      document.getElementById("transition-overlay").classList.remove("show");
    }

    // ===== GAME OVER =====
    function showGameOver() {
      const sorted = [...state.players].sort((a, b) => (state.scores[b] || 0) - (state.scores[a] || 0));
      const winner = sorted[0];

      document.getElementById("winner-name").textContent = winner;

      const finalScores = document.getElementById("final-scores");
      finalScores.innerHTML = "";
      sorted.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "final-score-row" + (i === 0 ? " winner" : "");
        const isElim = !state.activePlayers.includes(p);
        row.innerHTML = `
          <span>${i === 0 ? "🥇" : i === 1 ? "🥈" : "🥉"} ${p}</span>
          <span>${state.scores[p] || 0} ${t("score")} ${isElim ? "💀" : ""}</span>
        `;
        finalScores.appendChild(row);
      });

      showScreen("gameover");
    }

    document.getElementById("btn-play-again").addEventListener("click", () => {
      startGame();
    });
    document.getElementById("btn-new-players").addEventListener("click", () => {
      showScreen("setup");
    });

    onLangChange(() => {
      // Re-render phase banner text if game is running
      if (state.phase) setPhaseBanner(state.phase);
    });
  </script>
</body>
</html>
