<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Patch Panic</title>
  <script defer src="https://analytics.lab.gogerl.com/script.js" data-website-id="6544877e-6573-4ffa-b91f-db98c1bd4c77"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #102038;
      --panel-2: #142947;
      --line: #27476d;
      --text: #edf4ff;
      --muted: #9fb6d5;
      --accent: #ffcc00;
      --good: #50e3a4;
      --danger: #ff6f61;
      --cool: #79d6ff;
      --shield: #c39bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #102950 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .back-bar{width:100%;background:#0a0a1a;padding:0.5rem 1rem;border-bottom:1px solid #333;}
    .back-bar a{color:#ffcc00;text-decoration:none;font-size:0.9rem;font-family:system-ui,sans-serif;}
    .back-bar a:hover{text-decoration:underline;}
    .app { max-width: 560px; margin: 0 auto; padding: 1rem; }
    h1 { margin: 0 0 0.25rem; font-size: 2rem; color: var(--accent); }
    .subtitle { color: var(--muted); margin-bottom: 1rem; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: linear-gradient(180deg, rgba(20,41,71,0.98), rgba(10,22,39,0.98));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1rem;
      box-shadow: 0 14px 36px rgba(0,0,0,0.28);
      margin-bottom: 1rem;
    }
    .stack { display: grid; gap: 0.75rem; }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #091729;
      color: var(--text);
      font-size: 1rem;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      color: #04111f;
      background: var(--accent);
    }
    button.secondary {
      background: #183051;
      color: var(--text);
      border: 1px solid var(--line);
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .room-code {
      font-family: ui-monospace, monospace;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 0.25rem;
      text-align: center;
      background: #091729;
      border-radius: 16px;
      padding: 0.7rem 0;
      border: 2px solid var(--accent);
    }
    .players { display: grid; gap: 0.6rem; }
    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.7rem 0.85rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 999px;
      padding: 0.3rem 0.65rem;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .hud { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .hud-box { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 0.75rem; text-align: center; }
    .hud-box strong { display: block; font-size: 1.35rem; color: var(--accent); }
    .message { color: var(--muted); text-align: center; min-height: 1.5rem; margin: 0.5rem 0 0.75rem; }
    .zones { display: grid; gap: 0.85rem; }
    .zone-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0.85rem;
      background: rgba(255,255,255,0.04);
    }
    .zone-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .incidents { display: grid; gap: 0.6rem; }
    .incident {
      background: #0a182b;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 0.7rem;
      display: grid;
      gap: 0.55rem;
    }
    .incident.resolved { opacity: 0.55; }
    .incident-top { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; }
    .incident-name { font-weight: 800; }
    .steps { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .step {
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 800;
      background: #183051;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .step.done { background: rgba(80,227,164,0.18); color: var(--good); border-color: rgba(80,227,164,0.45); }
    .tool-btn.weld { background: var(--danger); color: white; }
    .tool-btn.cool { background: var(--cool); }
    .tool-btn.shield { background: var(--shield); }
    .tool-btn { padding: 0.7rem; }
    .empty-zone { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 0.4rem 0; }
    .role-banner { text-align: center; font-weight: 800; margin-bottom: 0.75rem; }
    .small { font-size: 0.88rem; color: var(--muted); }
    @media (max-width: 520px) {
      .app { padding: 0.6rem; }
      .split { grid-template-columns: 1fr; }
      .hud { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.4rem; }
      .zones { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.45rem; }
      .zone-card { padding: 0.45rem; border-radius: 12px; }
      .incident { padding: 0.42rem; border-radius: 12px; }
      .incident-name { font-size: 0.88rem; }
      .small { font-size: 0.74rem; }
      .step { font-size: 0.62rem; padding: 0.2rem 0.35rem; }
      .tool-btn { padding: 0.55rem; min-height: 44px; font-size: 0.82rem; }
      .player-row { padding: 0.5rem 0.65rem; }
      #scoreboard-card { display: none; }
      h1 { font-size: 1.55rem; }
      .subtitle { margin-bottom: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="back-bar"><a href="/">← Back to Games</a></div>
  <div class="app">
    <div id="screen-setup" class="screen active">
      <h1>Patch Panic</h1>
      <div class="subtitle" data-i18n="tagline"></div>
      <div class="card stack">
        <input id="player-name" maxlength="18" data-i18n-placeholder="namePlaceholder" placeholder="Name">
        <button id="btn-create" data-i18n="createRoom"></button>
        <div class="split">
          <input id="room-code-input" maxlength="4" placeholder="ABCD">
          <button id="btn-join" class="secondary" data-i18n="joinRoom"></button>
        </div>
        <div id="error-box" class="small"></div>
      </div>
      <div class="card small" data-i18n-html="howToBlurb"></div>
    </div>

    <div id="screen-lobby" class="screen">
      <div class="card stack">
        <div class="small" data-i18n="roomCode"></div>
        <div id="lobby-code" class="room-code">----</div>
        <div id="lobby-message" class="message"></div>
        <div id="lobby-players" class="players"></div>
        <button id="btn-start" data-i18n="startShift"></button>
      </div>
    </div>

    <div id="screen-game" class="screen">
      <div class="card">
        <div id="role-banner" class="role-banner"></div>
        <div class="hud">
          <div class="hud-box"><span data-i18n="hull"></span><strong id="hud-hull">100</strong></div>
          <div class="hud-box"><span data-i18n="time"></span><strong id="hud-time">75</strong></div>
          <div class="hud-box"><span data-i18n="repaired"></span><strong id="hud-fixed">0</strong></div>
        </div>
        <div id="game-message" class="message"></div>
      </div>
      <div id="zones" class="zones"></div>
      <div class="card" id="scoreboard-card">
        <div class="small" data-i18n="crewBoard"></div>
        <div id="scoreboard" class="players" style="margin-top:0.6rem"></div>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="card stack">
        <h1 id="result-title">Done</h1>
        <div id="result-copy" class="subtitle"></div>
        <div class="hud">
          <div class="hud-box"><span data-i18n="hull"></span><strong id="result-hull">0</strong></div>
          <div class="hud-box"><span data-i18n="time"></span><strong id="result-time">0</strong></div>
          <div class="hud-box"><span data-i18n="repaired"></span><strong id="result-fixed">0</strong></div>
        </div>
        <div id="result-players" class="players"></div>
        <button id="btn-restart" data-i18n="backToLobby"></button>
      </div>
    </div>
  </div>

  <script src="/shared/i18n.js"></script>

    const { t, translatePage } = initI18n(TRANSLATIONS);
    const state = { ws: null, room: null };
    const screens = {
      setup: document.getElementById('screen-setup'),
      lobby: document.getElementById('screen-lobby'),
      game: document.getElementById('screen-game'),
      result: document.getElementById('screen-result'),
    };

    function showScreen(key) {
      Object.values(screens).forEach((el) => el.classList.remove('active'));
      screens[key].classList.add('active');
    }

    function msgKey(raw) {
      return raw ? `msg_${raw}` : '';
    }

    function wsUrl() {
      if (window.__TEST_WS_URL) return window.__TEST_WS_URL;
      if (location.hostname.includes('games.lab.gogerl.com')) return 'wss://day-057-patch-panic.lab.gogerl.com';
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      return `${proto}://${location.hostname}:3057`;
    }

    function connect() {
      if (state.ws && (state.ws.readyState === WebSocket.OPEN || state.ws.readyState === WebSocket.CONNECTING)) return;
      state.ws = new WebSocket(wsUrl());
      state.ws.addEventListener('message', (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === 'error') {
          document.getElementById('error-box').textContent = t(payload.message);
          return;
        }
        if (payload.type === 'state') {
          state.room = payload;
          render();
        }
      });
      state.ws.addEventListener('close', () => {
        setTimeout(() => { if (!state.room || state.room.status !== 'playing') return; connect(); }, 1200);
      });
    }

    function send(data) {
      connect();
      const push = () => state.ws.send(JSON.stringify(data));
      if (state.ws.readyState === WebSocket.OPEN) push();
      else state.ws.addEventListener('open', push, { once: true });
    }

    function playerName() {
      return document.getElementById('player-name').value.trim() || 'Player';
    }

    function renderPlayers(targetId, players) {
      const root = document.getElementById(targetId);
      root.innerHTML = '';
      players.forEach((player) => {
        const row = document.createElement('div');
        row.className = 'player-row';
        const roleText = player.role ? t(`tool_${player.role}`) : '...';
        row.innerHTML = `<div><strong>${escapeHtml(player.name)}</strong><div class="small">${escapeHtml(roleText)}</div></div><div class="pill">${player.score ?? 0}</div>`;
        root.appendChild(row);
      });
    }

    function renderLobby(room) {
      document.getElementById('lobby-code').textContent = room.roomCode;
      document.getElementById('lobby-message').textContent = room.players.length >= 2 ? t(msgKey(room.message || 'crew_ready')) : t('tagline');
      renderPlayers('lobby-players', room.players);
      const startBtn = document.getElementById('btn-start');
      startBtn.disabled = !(room.isHost && room.players.length >= 2);
      startBtn.textContent = room.isHost ? t('startShift') : `${t('startShift')} · Host`;
    }

    function renderGame(room) {
      document.getElementById('hud-hull').textContent = room.hull;
      document.getElementById('hud-time').textContent = room.timeLeft;
      document.getElementById('hud-fixed').textContent = room.repaired;
      document.getElementById('game-message').textContent = t(msgKey(room.message || 'repair_now'));
      document.getElementById('role-banner').textContent = t(`role_${room.role}`);
      renderPlayers('scoreboard', room.players);

      const zones = document.getElementById('zones');
      zones.innerHTML = '';
      ['bridge','engine','cargo'].forEach((zone) => {
        const zoneCard = document.createElement('div');
        zoneCard.className = 'zone-card';
        const incidents = room.incidents.filter((incident) => incident.zone === zone);
        zoneCard.innerHTML = `<div class="zone-head"><strong>${t(`zone_${zone}`)}</strong><span class="pill">${incidents.filter(i => !i.resolved).length}</span></div>`;
        const list = document.createElement('div');
        list.className = 'incidents';

        if (!incidents.length) {
          list.innerHTML = `<div class="empty-zone">${t('noIncidents')}</div>`;
        } else {
          incidents.forEach((incident) => {
            const item = document.createElement('div');
            item.className = `incident ${incident.resolved ? 'resolved' : ''}`;
            const steps = incident.steps.map((step, index) => `<span class="step ${index < incident.progress ? 'done' : ''}">${t(`tool_${step}`)}</span>`).join('');
            item.innerHTML = `
              <div class="incident-top">
                <div>
                  <div class="incident-name">${t(`type_${incident.type}`)}</div>
                  <div class="small">${t('stepLabel')}</div>
                </div>
                <div class="pill">-${incident.damage}</div>
              </div>
              <div class="steps">${steps}</div>
            `;
            const btn = document.createElement('button');
            btn.className = `tool-btn ${room.role}`;
            btn.disabled = incident.resolved || room.status !== 'playing';
            btn.textContent = t(`tool_${room.role}`);
            btn.dataset.incidentId = incident.id;
            btn.addEventListener('click', () => send({ type: 'useTool', incidentId: incident.id }));
            item.appendChild(btn);
            list.appendChild(item);
          });
        }

        zoneCard.appendChild(list);
        zones.appendChild(zoneCard);
      });
    }

    function renderResult(room) {
      const won = room.status === 'won';
      document.getElementById('result-title').textContent = t(won ? 'resultWin' : 'resultLose');
      document.getElementById('result-copy').textContent = t(won ? 'resultWinCopy' : 'resultLoseCopy');
      document.getElementById('result-hull').textContent = room.hull;
      document.getElementById('result-time').textContent = room.timeLeft;
      document.getElementById('result-fixed').textContent = room.repaired;
      renderPlayers('result-players', [...room.players].sort((a, b) => b.score - a.score));
    }

    function render() {
      if (!state.room) return;
      translatePage();
      if (state.room.status === 'lobby') {
        showScreen('lobby');
        renderLobby(state.room);
      } else if (state.room.status === 'playing') {
        showScreen('game');
        renderGame(state.room);
      } else {
        showScreen('result');
        renderResult(state.room);
      }
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    document.getElementById('btn-create').addEventListener('click', () => {
      document.getElementById('error-box').textContent = '';
      send({ type: 'create', name: playerName() });
    });

    document.getElementById('btn-join').addEventListener('click', () => {
      document.getElementById('error-box').textContent = '';
      send({ type: 'join', name: playerName(), roomCode: document.getElementById('room-code-input').value.trim().toUpperCase() });
    });

    document.getElementById('btn-start').addEventListener('click', () => send({ type: 'start' }));
    document.getElementById('btn-restart').addEventListener('click', () => send({ type: 'restart' }));

    document.getElementById('player-name').value = localStorage.getItem('patch-panic-name') || '';
    document.getElementById('player-name').addEventListener('change', (event) => localStorage.setItem('patch-panic-name', event.target.value.trim()));
    connect();
    translatePage();
  </script>
</body>
</html>
