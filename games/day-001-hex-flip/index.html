<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hex Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: manipulation;
  }
  h1 {
    font-size: 1.8rem;
    margin-top: 1rem;
    color: #7df9ff;
    text-shadow: 0 0 20px rgba(125,249,255,0.3);
    letter-spacing: 2px;
  }
  #info {
    margin: 0.5rem 0;
    font-size: 1rem;
    color: #aaa;
  }
  #moves { color: #7df9ff; font-weight: bold; }
  canvas {
    cursor: pointer;
    margin-top: 0.5rem;
  }
  #controls {
    margin-top: 1rem;
    display: flex;
    gap: 1rem;
  }
  button {
    background: #1a1a3a;
    color: #7df9ff;
    border: 1px solid #7df9ff44;
    padding: 0.6rem 1.5rem;
    font-size: 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: #2a2a5a; border-color: #7df9ff; }
  #win-msg {
    display: none;
    font-size: 1.5rem;
    color: #4f4;
    margin-top: 1rem;
    text-shadow: 0 0 15px rgba(68,255,68,0.4);
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }
  #difficulty {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.5rem;
  }
  #difficulty button.active {
    background: #7df9ff33;
    border-color: #7df9ff;
  }
  .back-bar{width:100%;background:#0a0a1a;padding:0.5rem 1rem;border-bottom:1px solid #333;}.back-bar a{color:#ffcc00;text-decoration:none;font-size:0.9rem;font-family:system-ui,sans-serif;}.back-bar a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="back-bar"><a href="/" data-i18n="back">← Back to Games</a></div>
<h1>⬡ HEX FLIP</h1>
<div id="info"><span data-i18n="moves">Moves:</span> <span id="moves">0</span></div>
<canvas id="game"></canvas>
<div id="difficulty">
  <button data-r="1" data-m="2" data-i18n="easy">Easy</button>
  <button data-r="2" data-m="4" class="active" data-i18n="medium">Medium</button>
  <button data-r="3" data-m="6" data-i18n="hard">Hard</button>
</div>
<div id="controls">
  <button id="reset" data-i18n="newPuzzle">New Puzzle</button>
  <button id="undo" data-i18n="undo">Undo</button>
</div>
<div id="win-msg" data-i18n="solved">🎉 Solved!</div>

<script src="/shared/i18n.js"></script>
<script>
const TRANSLATIONS = {
  de: {
    back: '← Zurück zu den Spielen',
    moves: 'Züge:',
    easy: 'Leicht',
    medium: 'Mittel',
    hard: 'Schwer',
    newPuzzle: 'Neues Rätsel',
    undo: 'Rückgängig',
    solved: '🎉 Gelöst!',
  },
  en: {
    back: '← Back to Games',
    moves: 'Moves:',
    easy: 'Easy',
    medium: 'Medium',
    hard: 'Hard',
    newPuzzle: 'New Puzzle',
    undo: 'Undo',
    solved: '🎉 Solved!',
  },
  it: {
    back: '← Torna ai giochi',
    moves: 'Mosse:',
    easy: 'Facile',
    medium: 'Medio',
    hard: 'Difficile',
    newPuzzle: 'Nuovo puzzle',
    undo: 'Annulla',
    solved: '🎉 Risolto!',
  },
  es: {
    back: '← Volver a los juegos',
    moves: 'Movimientos:',
    easy: 'Fácil',
    medium: 'Medio',
    hard: 'Difícil',
    newPuzzle: 'Nuevo puzzle',
    undo: 'Deshacer',
    solved: '🎉 ¡Resuelto!',
  },
  fr: {
    back: '← Retour aux jeux',
    moves: 'Coups :',
    easy: 'Facile',
    medium: 'Moyen',
    hard: 'Difficile',
    newPuzzle: 'Nouveau puzzle',
    undo: 'Annuler',
    solved: '🎉 Résolu !',
  },
};
const { t, lang, onLangChange, translatePage } = initI18n(TRANSLATIONS);
window.t = t;
window.onLangChange = onLangChange;
</script>

<script type="module">
import { createGrid, getNeighbors, toggle, isWin, generatePuzzle } from './game.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const movesEl = document.getElementById('moves');
const winMsg = document.getElementById('win-msg');

let radius = 2, puzzleMoves = 4;
let grid, moveCount, history;
let hexSize, offsetX, offsetY;

function init() {
  moveCount = 0;
  history = [];
  grid = generatePuzzle(radius, puzzleMoves);
  movesEl.textContent = '0';
  winMsg.style.display = 'none';
  resize();
  draw();
}

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 500);
  const maxH = Math.min(window.innerHeight - 250, 500);
  const size = Math.min(maxW, maxH);
  canvas.width = size;
  canvas.height = size;
  hexSize = size / (radius * 4 + 4);
  offsetX = size / 2;
  offsetY = size / 2;
}

function hexToPixel(q, r) {
  const x = hexSize * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r);
  const y = hexSize * (1.5 * r);
  return [x + offsetX, y + offsetY];
}

function pixelToHex(px, py) {
  const x = px - offsetX;
  const y = py - offsetY;
  const q = (Math.sqrt(3) / 3 * x - 1 / 3 * y) / hexSize;
  const r = (2 / 3 * y) / hexSize;
  // Round to nearest hex
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(-q - r);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - (-q - r));
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return [rq, rr];
}

function drawHex(cx, cy, size, filled, highlight) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const hx = cx + size * Math.cos(angle);
    const hy = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  if (filled) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size);
    g.addColorStop(0, '#7df9ff');
    g.addColorStop(1, '#2a8a9a');
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = highlight ? '#1a2a3a' : '#0f1525';
  }
  ctx.fill();
  ctx.strokeStyle = '#3a5a6a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

let hoverHex = null;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const key in grid) {
    const [q, r] = key.split(',').map(Number);
    const [px, py] = hexToPixel(q, r);
    const isHover = hoverHex && hoverHex[0] === q && hoverHex[1] === r;
    drawHex(px, py, hexSize * 0.9, grid[key] === 1, isHover);
  }
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const [q, r] = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
  const key = `${q},${r}`;
  if (!(key in grid)) return;
  history.push({ ...grid });
  grid = toggle(grid, q, r);
  moveCount++;
  movesEl.textContent = moveCount;
  draw();
  if (isWin(grid)) {
    winMsg.style.display = 'block';
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const [q, r] = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
  const key = `${q},${r}`;
  hoverHex = key in grid ? [q, r] : null;
  draw();
});

canvas.addEventListener('mouseleave', () => { hoverHex = null; draw(); });

document.getElementById('reset').addEventListener('click', init);
document.getElementById('undo').addEventListener('click', () => {
  if (history.length === 0) return;
  grid = history.pop();
  moveCount--;
  movesEl.textContent = moveCount;
  winMsg.style.display = 'none';
  draw();
});

document.querySelectorAll('#difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('#difficulty .active')?.classList.remove('active');
    btn.classList.add('active');
    radius = parseInt(btn.dataset.r);
    puzzleMoves = parseInt(btn.dataset.m);
    init();
  });
});

window.addEventListener('resize', () => { resize(); draw(); });
init();
</script>
</body>
</html>
