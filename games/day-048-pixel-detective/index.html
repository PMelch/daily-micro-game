<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Detective 🔍</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .back-bar {
    width: 100%;
    background: #0a0a1a;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid #333;
  }
  .back-bar a {
    color: #ffcc00;
    text-decoration: none;
    font-size: 0.9rem;
    font-family: system-ui, sans-serif;
  }
  .back-bar a:hover { text-decoration: underline; }

  body {
    background: #0d0d1a;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    gap: 1rem;
  }

  /* ---- START SCREEN ---- */
  #start-screen {
    text-align: center;
    max-width: 480px;
  }
  #start-screen h1 {
    font-size: 2.5rem;
    color: #ffcc00;
    margin-bottom: 0.3rem;
  }
  #start-screen p {
    color: #aaa;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .btn-start {
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 0.8rem 2rem;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .btn-start:hover { background: #ffd740; transform: scale(1.05); }
  .btn-start:active { transform: scale(0.97); }

  /* ---- GAME SCREEN ---- */
  #game-screen { display: none; width: 100%; max-width: 480px; }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .hud-score {
    font-size: 1.1rem;
    color: #ffcc00;
    font-weight: 700;
  }
  .hud-round {
    font-size: 0.95rem;
    color: #aaa;
  }

  .timer-bar-wrap {
    width: 100%;
    height: 6px;
    background: #222;
    border-radius: 3px;
    margin-bottom: 0.8rem;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: #ffcc00;
    border-radius: 3px;
    transition: width 0.1s linear, background 0.5s;
  }

  .canvas-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #111;
    border: 2px solid #333;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  #game-canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  .answer-hint {
    text-align: center;
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.3rem;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    width: 100%;
    margin-top: 0.3rem;
  }
  .choice-btn {
    background: #1a1a2e;
    border: 2px solid #333;
    color: #eee;
    padding: 0.7rem 0.5rem;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    font-weight: 600;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: #ffcc00;
    background: #22223a;
    transform: scale(1.03);
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-btn.correct {
    border-color: #00cc66;
    background: #0d3320;
    color: #00ff88;
  }
  .choice-btn.wrong {
    border-color: #cc3333;
    background: #330d0d;
    color: #ff6666;
  }
  .choice-btn:disabled { cursor: default; }

  /* Feedback overlay */
  .feedback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5rem;
    font-weight: 900;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    z-index: 10;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct-fb { color: #00ff88; }
  .feedback.wrong-fb { color: #ff6666; }
  .feedback.timeout-fb { color: #ffcc00; }

  /* Score popup */
  .score-pop {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6rem;
    font-weight: 900;
    color: #ffcc00;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, top 0.8s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    z-index: 10;
  }
  .score-pop.show { opacity: 1; top: 15%; }

  /* ---- RESULTS SCREEN ---- */
  #results-screen {
    display: none;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  #results-screen h2 {
    font-size: 2rem;
    color: #ffcc00;
    margin-bottom: 0.5rem;
  }
  .final-score {
    font-size: 3.5rem;
    font-weight: 900;
    color: #fff;
    margin: 0.5rem 0;
  }
  .final-score span { color: #ffcc00; }
  .result-msg {
    font-size: 1.1rem;
    color: #aaa;
    margin-bottom: 1.5rem;
  }
  .result-rows {
    width: 100%;
    margin-bottom: 1.5rem;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid #222;
    font-size: 0.95rem;
  }
  .result-row .rr-subject { color: #ccc; }
  .result-row .rr-icon { font-size: 1.2rem; }
  .result-row .rr-pts { color: #ffcc00; font-weight: 700; min-width: 60px; text-align: right; }
  .btn-play-again {
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 0.8rem 2rem;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .btn-play-again:hover { background: #ffd740; transform: scale(1.05); }
</style>
</head>
<body>
<div class="back-bar"><a href="/">← <span data-i18n="back">Zurück</span></a></div>

<div id="game-wrap">

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>🔍 Pixel Detective</h1>
    <p data-i18n="intro">Erkenne das pixelierte Bild so schnell wie möglich! Früher raten = mehr Punkte. 5 Runden — wer schafft 500?</p>
    <button class="btn-start" onclick="startGame()" data-i18n="startBtn">Detektiv spielen!</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="hud">
      <div class="hud-score">⭐ <span id="score-display">0</span></div>
      <div class="hud-round"><span data-i18n="round">Runde</span> <span id="round-display">1</span>/5</div>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="game-canvas" width="400" height="400"></canvas>
      <div class="feedback" id="feedback"></div>
      <div class="score-pop" id="score-pop"></div>
    </div>
    <p class="answer-hint" data-i18n="answerHint">Was siehst du?</p>
    <div class="choices" id="choices"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <h2 data-i18n="resultsTitle">Ermittlung abgeschlossen!</h2>
    <div class="final-score"><span id="final-score-val">0</span> <span style="font-size:1.5rem;color:#aaa">/ 500</span></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-rows" id="result-rows"></div>
    <button class="btn-play-again" onclick="startGame()" data-i18n="playAgain">Nochmal spielen</button>
  </div>

</div>

<script src="/shared/i18n.js"></script>
<script>
// =============================================
// TRANSLATIONS
// =============================================
const TRANSLATIONS = {
  de: {
    back: "Zurück",
    intro: "Erkenne das pixelierte Bild so schnell wie möglich! Früher raten = mehr Punkte. 5 Runden — wer schafft 500?",
    startBtn: "Detektiv spielen!",
    round: "Runde",
    answerHint: "Was siehst du?",
    resultsTitle: "Ermittlung abgeschlossen!",
    playAgain: "Nochmal spielen",
    correct: "RICHTIG!",
    wrong: "FALSCH!",
    timeout: "ZU SPÄT!",
    pts: "Punkte",
    rankS: "Meisterdetektiv! 🕵️",
    rankA: "Scharfsinnig! 🔍",
    rankB: "Guter Spürsinn! 👁️",
    rankC: "Weiter üben! 🧩",
    answerWas: "War:",
  },
  en: {
    back: "Back",
    intro: "Identify the pixelated image as fast as possible! Earlier guess = more points. 5 rounds — can you score 500?",
    startBtn: "Play Detective!",
    round: "Round",
    answerHint: "What do you see?",
    resultsTitle: "Case Closed!",
    playAgain: "Play Again",
    correct: "CORRECT!",
    wrong: "WRONG!",
    timeout: "TOO LATE!",
    pts: "pts",
    rankS: "Master Detective! 🕵️",
    rankA: "Sharp Eye! 🔍",
    rankB: "Good Instincts! 👁️",
    rankC: "Keep Practicing! 🧩",
    answerWas: "Was:",
  },
  fr: {
    back: "Retour",
    intro: "Identifie l'image pixelisée le plus vite possible ! Répondre tôt = plus de points. 5 manches — peux-tu scorer 500 ?",
    startBtn: "Jouer Détective !",
    round: "Manche",
    answerHint: "Que vois-tu ?",
    resultsTitle: "Affaire Classée !",
    playAgain: "Rejouer",
    correct: "CORRECT !",
    wrong: "FAUX !",
    timeout: "TROP TARD !",
    pts: "pts",
    rankS: "Détective Maître ! 🕵️",
    rankA: "Œil Acéré ! 🔍",
    rankB: "Bon Instinct ! 👁️",
    rankC: "Continue à Pratiquer ! 🧩",
    answerWas: "C'était :",
  },
  it: {
    back: "Indietro",
    intro: "Identifica l'immagine pixelata il più velocemente possibile! Prima rispondi = più punti. 5 round — riesci a fare 500?",
    startBtn: "Gioca al Detective!",
    round: "Round",
    answerHint: "Cosa vedi?",
    resultsTitle: "Caso Chiuso!",
    playAgain: "Gioca Ancora",
    correct: "CORRETTO!",
    wrong: "SBAGLIATO!",
    timeout: "TROPPO TARDI!",
    pts: "punti",
    rankS: "Detective Maestro! 🕵️",
    rankA: "Occhio Acuto! 🔍",
    rankB: "Buon Istinto! 👁️",
    rankC: "Continua a Praticare! 🧩",
    answerWas: "Era:",
  },
  es: {
    back: "Volver",
    intro: "¡Identifica la imagen pixelada lo más rápido posible! Responder antes = más puntos. 5 rondas — ¿puedes conseguir 500?",
    startBtn: "¡Jugar Detective!",
    round: "Ronda",
    answerHint: "¿Qué ves?",
    resultsTitle: "¡Caso Cerrado!",
    playAgain: "Jugar de Nuevo",
    correct: "¡CORRECTO!",
    wrong: "¡INCORRECTO!",
    timeout: "¡DEMASIADO TARDE!",
    pts: "pts",
    rankS: "¡Detective Maestro! 🕵️",
    rankA: "¡Ojo Agudo! 🔍",
    rankB: "¡Buen Instinto! 👁️",
    rankC: "¡Sigue Practicando! 🧩",
    answerWas: "Era:",
  },
};

const i18n = initI18n(TRANSLATIONS);
const { t } = i18n;

// =============================================
// SUBJECTS — programmatically drawn images
// Each subject: { key, draw: (ctx, w, h) => void, choices: [key, ...] }
// =============================================
const SUBJECTS = [
  {
    key: "house",
    nameKeys: { de: "Haus", en: "House", fr: "Maison", it: "Casa", es: "Casa" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      // Sky
      ctx.fillStyle = "#87ceeb";
      ctx.fillRect(0, 0, w, h);
      // Ground
      ctx.fillStyle = "#7ec850";
      ctx.fillRect(0, h * 0.72, w, h * 0.28);
      // House body
      ctx.fillStyle = "#e8d5a0";
      ctx.fillRect(w*0.2, h*0.45, w*0.6, h*0.35);
      // Door
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(w*0.43, h*0.62, w*0.14, h*0.18);
      ctx.fillStyle = "#D2691E";
      ctx.beginPath(); ctx.arc(w*0.54, h*0.71, w*0.015, 0, Math.PI*2); ctx.fill();
      // Windows
      ctx.fillStyle = "#aaddff";
      ctx.fillRect(w*0.25, h*0.52, w*0.12, h*0.1);
      ctx.fillRect(w*0.63, h*0.52, w*0.12, h*0.1);
      ctx.strokeStyle = "#888"; ctx.lineWidth = 2;
      ctx.strokeRect(w*0.25, h*0.52, w*0.12, h*0.1);
      ctx.strokeRect(w*0.63, h*0.52, w*0.12, h*0.1);
      // Cross on windows
      ctx.beginPath();
      ctx.moveTo(w*0.31, h*0.52); ctx.lineTo(w*0.31, h*0.62);
      ctx.moveTo(w*0.25, h*0.57); ctx.lineTo(w*0.37, h*0.57);
      ctx.moveTo(w*0.69, h*0.52); ctx.lineTo(w*0.69, h*0.62);
      ctx.moveTo(w*0.63, h*0.57); ctx.lineTo(w*0.75, h*0.57);
      ctx.stroke();
      // Roof
      ctx.fillStyle = "#cc4444";
      ctx.beginPath();
      ctx.moveTo(w*0.15, h*0.47);
      ctx.lineTo(w*0.5, h*0.2);
      ctx.lineTo(w*0.85, h*0.47);
      ctx.closePath();
      ctx.fill();
      // Chimney
      ctx.fillStyle = "#995544";
      ctx.fillRect(w*0.62, h*0.25, w*0.07, h*0.15);
      // Smoke
      ctx.fillStyle = "rgba(180,180,180,0.5)";
      ctx.beginPath(); ctx.arc(w*0.66, h*0.22, w*0.025, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(w*0.68, h*0.17, w*0.018, 0, Math.PI*2); ctx.fill();
    }
  },
  {
    key: "cat",
    nameKeys: { de: "Katze", en: "Cat", fr: "Chat", it: "Gatto", es: "Gato" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f0e6d0"; ctx.fillRect(0,0,w,h);
      // Body
      ctx.fillStyle = "#777";
      ctx.beginPath(); ctx.ellipse(w*0.5, h*0.65, w*0.25, h*0.2, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.arc(w*0.5, h*0.4, w*0.2, 0, Math.PI*2); ctx.fill();
      // Ears
      ctx.fillStyle = "#777";
      ctx.beginPath(); ctx.moveTo(w*0.33,h*0.27); ctx.lineTo(w*0.28,h*0.16); ctx.lineTo(w*0.43,h*0.24); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(w*0.67,h*0.27); ctx.lineTo(w*0.72,h*0.16); ctx.lineTo(w*0.57,h*0.24); ctx.closePath(); ctx.fill();
      // Inner ears
      ctx.fillStyle = "#ffaaaa";
      ctx.beginPath(); ctx.moveTo(w*0.34,h*0.265); ctx.lineTo(w*0.30,h*0.19); ctx.lineTo(w*0.42,h*0.25); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(w*0.66,h*0.265); ctx.lineTo(w*0.70,h*0.19); ctx.lineTo(w*0.58,h*0.25); ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = "#222";
      ctx.beginPath(); ctx.ellipse(w*0.42, h*0.37, w*0.035, h*0.045, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(w*0.58, h*0.37, w*0.035, h*0.045, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(w*0.435, h*0.36, w*0.01, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(w*0.595, h*0.36, w*0.01, 0, Math.PI*2); ctx.fill();
      // Nose
      ctx.fillStyle = "#ffaaaa";
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.43); ctx.lineTo(w*0.47,h*0.41); ctx.lineTo(w*0.53,h*0.41); ctx.closePath(); ctx.fill();
      // Mouth
      ctx.strokeStyle = "#555"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.43); ctx.quadraticCurveTo(w*0.45,h*0.47,w*0.42,h*0.45); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.43); ctx.quadraticCurveTo(w*0.55,h*0.47,w*0.58,h*0.45); ctx.stroke();
      // Whiskers
      ctx.strokeStyle = "#888"; ctx.lineWidth = 1;
      [[0.3,0.43,0.47,0.42],[0.3,0.44,0.47,0.44],[0.3,0.45,0.47,0.46],
       [0.7,0.43,0.53,0.42],[0.7,0.44,0.53,0.44],[0.7,0.45,0.53,0.46]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(w*x1,h*y1); ctx.lineTo(w*x2,h*y2); ctx.stroke();
      });
      // Tail
      ctx.strokeStyle = "#777"; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(w*0.75,h*0.72); ctx.quadraticCurveTo(w*0.9,h*0.55,w*0.82,h*0.4); ctx.stroke();
      // Legs
      ctx.fillStyle = "#777";
      ctx.fillRect(w*0.3,h*0.78,w*0.1,h*0.12);
      ctx.fillRect(w*0.42,h*0.78,w*0.1,h*0.12);
      ctx.fillRect(w*0.56,h*0.78,w*0.1,h*0.12);
      ctx.fillRect(w*0.6,h*0.78,w*0.1,h*0.12);
    }
  },
  {
    key: "bicycle",
    nameKeys: { de: "Fahrrad", en: "Bicycle", fr: "Vélo", it: "Bicicletta", es: "Bicicleta" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#eef5ff"; ctx.fillRect(0,0,w,h);
      const cx1 = w*0.28, cy = h*0.65, cx2 = w*0.72, r = w*0.2;
      // Wheels
      ctx.strokeStyle = "#333"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(cx1, cy, r, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx2, cy, r, 0, Math.PI*2); ctx.stroke();
      // Spokes
      ctx.lineWidth = 2; ctx.strokeStyle = "#666";
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4;
        [cx1,cx2].forEach(cx=>{
          ctx.beginPath();
          ctx.moveTo(cx+Math.cos(a)*r*0.1, cy+Math.sin(a)*r*0.1);
          ctx.lineTo(cx+Math.cos(a)*r*0.9, cy+Math.sin(a)*r*0.9);
          ctx.stroke();
        });
      }
      // Frame
      ctx.strokeStyle = "#cc3333"; ctx.lineWidth = 5;
      // Chain stay
      ctx.beginPath(); ctx.moveTo(cx1, cy); ctx.lineTo(cx2, cy); ctx.stroke();
      // Seat tube
      ctx.beginPath(); ctx.moveTo(w*0.5, cy); ctx.lineTo(w*0.5, h*0.38); ctx.stroke();
      // Down tube
      ctx.beginPath(); ctx.moveTo(w*0.5, cy); ctx.lineTo(cx2, cy); ctx.stroke();
      // Top tube + head
      ctx.beginPath(); ctx.moveTo(w*0.5, h*0.38); ctx.lineTo(w*0.63, h*0.38); ctx.stroke();
      // Fork
      ctx.beginPath(); ctx.moveTo(w*0.63, h*0.38); ctx.lineTo(cx2, cy); ctx.stroke();
      // Seat
      ctx.fillStyle = "#333";
      ctx.fillRect(w*0.42, h*0.35, w*0.16, h*0.04);
      ctx.fillRect(w*0.495, h*0.36, w*0.01, h*0.04);
      // Handlebar
      ctx.strokeStyle = "#333"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(w*0.6, h*0.38); ctx.lineTo(w*0.68, h*0.38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*0.6, h*0.35); ctx.lineTo(w*0.6, h*0.42); ctx.stroke();
      // Pedal
      ctx.fillStyle = "#333";
      ctx.beginPath(); ctx.arc(w*0.5, cy, w*0.03, 0, Math.PI*2); ctx.fill();
    }
  },
  {
    key: "tree",
    nameKeys: { de: "Baum", en: "Tree", fr: "Arbre", it: "Albero", es: "Árbol" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#d0eaff"; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = "#7ec850"; ctx.fillRect(0,h*0.8,w,h*0.2);
      // Trunk
      ctx.fillStyle = "#8B5E3C";
      ctx.fillRect(w*0.44, h*0.6, w*0.12, h*0.25);
      // Foliage (layered triangles)
      ctx.fillStyle = "#228B22";
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.08); ctx.lineTo(w*0.2,h*0.45); ctx.lineTo(w*0.8,h*0.45); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#2da32d";
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.18); ctx.lineTo(w*0.17,h*0.56); ctx.lineTo(w*0.83,h*0.56); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#3cb33c";
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.3); ctx.lineTo(w*0.15,h*0.65); ctx.lineTo(w*0.85,h*0.65); ctx.closePath(); ctx.fill();
      // Highlights
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.1); ctx.lineTo(w*0.35,h*0.4); ctx.lineTo(w*0.5,h*0.38); ctx.closePath(); ctx.fill();
    }
  },
  {
    key: "rocket",
    nameKeys: { de: "Rakete", en: "Rocket", fr: "Fusée", it: "Razzo", es: "Cohete" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      // Space bg
      const grad = ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0, "#050520"); grad.addColorStop(1, "#1a1a60");
      ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
      // Stars
      ctx.fillStyle = "#fff";
      [[0.1,0.1],[0.3,0.05],[0.7,0.15],[0.9,0.08],[0.2,0.3],[0.85,0.25],[0.05,0.5],[0.95,0.45]].forEach(([x,y])=>{
        ctx.beginPath(); ctx.arc(w*x,h*y,w*0.008,0,Math.PI*2); ctx.fill();
      });
      // Rocket body
      ctx.fillStyle = "#ddd";
      ctx.beginPath();
      ctx.moveTo(w*0.5, h*0.12);
      ctx.bezierCurveTo(w*0.35,h*0.12, w*0.3,h*0.3, w*0.3,h*0.55);
      ctx.lineTo(w*0.3,h*0.72); ctx.lineTo(w*0.7,h*0.72);
      ctx.lineTo(w*0.7,h*0.55);
      ctx.bezierCurveTo(w*0.7,h*0.3, w*0.65,h*0.12, w*0.5,h*0.12);
      ctx.closePath(); ctx.fill();
      // Window
      ctx.fillStyle = "#aaddff";
      ctx.beginPath(); ctx.arc(w*0.5,h*0.42,w*0.1,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#999"; ctx.lineWidth = 2; ctx.stroke();
      // Fins
      ctx.fillStyle = "#cc4444";
      ctx.beginPath(); ctx.moveTo(w*0.3,h*0.72); ctx.lineTo(w*0.15,h*0.85); ctx.lineTo(w*0.3,h*0.82); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(w*0.7,h*0.72); ctx.lineTo(w*0.85,h*0.85); ctx.lineTo(w*0.7,h*0.82); ctx.closePath(); ctx.fill();
      // Flame
      ctx.fillStyle = "#ff8800";
      ctx.beginPath(); ctx.moveTo(w*0.35,h*0.75); ctx.quadraticCurveTo(w*0.4,h*0.95,w*0.5,h*1.0); ctx.quadraticCurveTo(w*0.6,h*0.95,w*0.65,h*0.75); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#ffcc00";
      ctx.beginPath(); ctx.moveTo(w*0.38,h*0.75); ctx.quadraticCurveTo(w*0.43,h*0.9,w*0.5,h*0.95); ctx.quadraticCurveTo(w*0.57,h*0.9,w*0.62,h*0.75); ctx.closePath(); ctx.fill();
      // Red stripe
      ctx.fillStyle = "#cc4444";
      ctx.fillRect(w*0.3,h*0.6,w*0.4,h*0.06);
    }
  },
  {
    key: "apple",
    nameKeys: { de: "Apfel", en: "Apple", fr: "Pomme", it: "Mela", es: "Manzana" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f5f5dc"; ctx.fillRect(0,0,w,h);
      // Stem
      ctx.strokeStyle = "#5a3000"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.22); ctx.quadraticCurveTo(w*0.55,h*0.12,w*0.58,h*0.1); ctx.stroke();
      // Leaf
      ctx.fillStyle = "#44aa22";
      ctx.beginPath(); ctx.moveTo(w*0.52,h*0.18); ctx.quadraticCurveTo(w*0.65,h*0.08,w*0.7,h*0.15); ctx.quadraticCurveTo(w*0.6,h*0.2,w*0.52,h*0.18); ctx.closePath(); ctx.fill();
      // Apple body
      const ag = ctx.createRadialGradient(w*0.42,h*0.38,w*0.05,w*0.5,h*0.55,w*0.3);
      ag.addColorStop(0,"#ff6666"); ag.addColorStop(0.5,"#dd2222"); ag.addColorStop(1,"#990000");
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.moveTo(w*0.5,h*0.25);
      ctx.bezierCurveTo(w*0.25,h*0.22, w*0.15,h*0.45, w*0.2,h*0.65);
      ctx.bezierCurveTo(w*0.25,h*0.85, w*0.4,h*0.9, w*0.5,h*0.88);
      ctx.bezierCurveTo(w*0.6,h*0.9, w*0.75,h*0.85, w*0.8,h*0.65);
      ctx.bezierCurveTo(w*0.85,h*0.45, w*0.75,h*0.22, w*0.5,h*0.25);
      ctx.closePath(); ctx.fill();
      // Shine
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath(); ctx.ellipse(w*0.38,h*0.38,w*0.08,h*0.12,-0.5,0,Math.PI*2); ctx.fill();
    }
  },
  {
    key: "fish",
    nameKeys: { de: "Fisch", en: "Fish", fr: "Poisson", it: "Pesce", es: "Pez" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0,0,0,h);
      bg.addColorStop(0,"#006994"); bg.addColorStop(1,"#00334d");
      ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
      // Bubbles
      ctx.strokeStyle = "rgba(200,220,255,0.4)"; ctx.lineWidth = 1.5;
      [[0.7,0.2,8],[0.75,0.1,5],[0.65,0.08,6]].forEach(([x,y,r])=>{
        ctx.beginPath(); ctx.arc(w*x,h*y,r,0,Math.PI*2); ctx.stroke();
      });
      // Tail
      ctx.fillStyle = "#ff8c00";
      ctx.beginPath(); ctx.moveTo(w*0.25,h*0.5); ctx.lineTo(w*0.1,h*0.32); ctx.lineTo(w*0.1,h*0.68); ctx.closePath(); ctx.fill();
      // Body
      const fg = ctx.createRadialGradient(w*0.5,h*0.48,w*0.05,w*0.5,h*0.5,w*0.3);
      fg.addColorStop(0,"#ffbb44"); fg.addColorStop(1,"#cc6600");
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.ellipse(w*0.55,h*0.5,w*0.32,h*0.2,0,0,Math.PI*2); ctx.fill();
      // Scales hint
      ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 1;
      for(let i=0;i<4;i++) {
        const sx = w*(0.36+i*0.07), sy = h*0.5;
        ctx.beginPath(); ctx.arc(sx,sy,w*0.05,-Math.PI*0.6,Math.PI*0.6); ctx.stroke();
      }
      // Fin top
      ctx.fillStyle = "#ff8c00";
      ctx.beginPath(); ctx.moveTo(w*0.45,h*0.32); ctx.lineTo(w*0.35,h*0.22); ctx.lineTo(w*0.65,h*0.32); ctx.closePath(); ctx.fill();
      // Eye
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(w*0.73,h*0.46,w*0.045,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath(); ctx.arc(w*0.735,h*0.46,w*0.025,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(w*0.745,h*0.45,w*0.01,0,Math.PI*2); ctx.fill();
      // Mouth
      ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(w*0.83,h*0.5,w*0.03,Math.PI*0.1,Math.PI*0.9); ctx.stroke();
    }
  },
  {
    key: "star",
    nameKeys: { de: "Stern", en: "Star", fr: "Étoile", it: "Stella", es: "Estrella" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0,0,0,h);
      bg.addColorStop(0,"#000010"); bg.addColorStop(1,"#000030");
      ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
      // Small stars
      ctx.fillStyle = "#fff";
      [[0.1,0.1],[0.3,0.2],[0.8,0.15],[0.9,0.35],[0.15,0.75],[0.85,0.8],[0.05,0.5],[0.95,0.6]].forEach(([x,y])=>{
        ctx.beginPath(); ctx.arc(w*x,h*y,1.5,0,Math.PI*2); ctx.fill();
      });
      // Big star
      const cx=w*0.5, cy=h*0.5, outer=w*0.38, inner=w*0.16, spikes=5;
      const sg = ctx.createRadialGradient(cx,cy*0.7,5,cx,cy,outer);
      sg.addColorStop(0,"#fffde7"); sg.addColorStop(0.4,"#ffd700"); sg.addColorStop(1,"#ff8c00");
      ctx.fillStyle = sg;
      ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 30;
      ctx.beginPath();
      for(let i=0;i<spikes;i++) {
        const outerA = Math.PI/spikes*2*i - Math.PI/2;
        const innerA = outerA + Math.PI/spikes;
        if(i===0) ctx.moveTo(cx+Math.cos(outerA)*outer, cy+Math.sin(outerA)*outer);
        else ctx.lineTo(cx+Math.cos(outerA)*outer, cy+Math.sin(outerA)*outer);
        ctx.lineTo(cx+Math.cos(innerA)*inner, cy+Math.sin(innerA)*inner);
      }
      ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
      // Shine
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath(); ctx.ellipse(cx-outer*0.2, cy-outer*0.25, outer*0.12, outer*0.07, -0.5, 0, Math.PI*2); ctx.fill();
    }
  },
  {
    key: "umbrella",
    nameKeys: { de: "Regenschirm", en: "Umbrella", fr: "Parapluie", it: "Ombrello", es: "Paraguas" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#e8f4f8"; ctx.fillRect(0,0,w,h);
      // Rain
      ctx.strokeStyle = "rgba(100,150,200,0.4)"; ctx.lineWidth = 1.5;
      for(let i=0;i<20;i++){
        const rx=Math.random()*w, ry=Math.random()*h;
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-3,ry+12); ctx.stroke();
      }
      // Handle
      ctx.strokeStyle = "#8B5E3C"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(w*0.5,h*0.5); ctx.lineTo(w*0.5,h*0.82); ctx.stroke();
      ctx.beginPath(); ctx.arc(w*0.44,h*0.83,w*0.06,-Math.PI,0); ctx.stroke();
      // Canopy stripes
      const colors = ["#cc3333","#3366cc","#cc3333","#3366cc","#cc3333","#3366cc","#cc3333","#3366cc"];
      const cx=w*0.5, top=h*0.18, rad=w*0.38;
      for(let i=0;i<8;i++){
        const a1 = Math.PI + i*Math.PI/8;
        const a2 = Math.PI + (i+1)*Math.PI/8;
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.moveTo(cx,top);
        ctx.arc(cx, top+rad*0.3, rad, a1-Math.PI, a2-Math.PI);
        ctx.closePath(); ctx.fill();
      }
      // Canopy border
      ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx,top+rad*0.3,rad,Math.PI,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-rad,top+rad*0.3); ctx.lineTo(cx+rad,top+rad*0.3); ctx.stroke();
      // Tip
      ctx.fillStyle = "#ffcc00";
      ctx.beginPath(); ctx.arc(cx,top+rad*0.3,w*0.015,0,Math.PI*2); ctx.fill();
    }
  },
  {
    key: "piano",
    nameKeys: { de: "Klavier", en: "Piano", fr: "Piano", it: "Pianoforte", es: "Piano" },
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#2a2020"; ctx.fillRect(0,0,w,h);
      // Piano body
      ctx.fillStyle = "#111";
      ctx.fillRect(w*0.08, h*0.25, w*0.84, h*0.5);
      ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.strokeRect(w*0.08,h*0.25,w*0.84,h*0.5);
      // Lid
      ctx.fillStyle = "#222";
      ctx.fillRect(w*0.08,h*0.22,w*0.84,h*0.05);
      // White keys
      const numWhite = 8;
      const keyW = (w*0.78) / numWhite;
      const keyH = h*0.35;
      const startX = w*0.11, startY = h*0.35;
      for(let i=0;i<numWhite;i++){
        ctx.fillStyle = "#f5f5f5";
        ctx.fillRect(startX+i*keyW, startY, keyW-2, keyH);
        ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1;
        ctx.strokeRect(startX+i*keyW, startY, keyW-2, keyH);
      }
      // Black keys
      const blackPos = [0.5,1.5,3.5,4.5,5.5];
      for(const bp of blackPos){
        ctx.fillStyle = "#111";
        ctx.fillRect(startX+bp*keyW, startY, keyW*0.6, keyH*0.62);
      }
      // Pedals
      ctx.fillStyle = "#888";
      [0.38,0.48,0.58].forEach(px => {
        ctx.beginPath(); ctx.ellipse(w*px, h*0.8, w*0.02, h*0.025, 0, 0, Math.PI*2); ctx.fill();
      });
      // Branding
      ctx.fillStyle = "#666";
      ctx.font = `italic ${w*0.05}px serif`;
      ctx.fillText("Grand", w*0.37, h*0.3);
    }
  },
];

// 5 unique rounds per game - random without repeat
function pickRounds() {
  const shuffled = [...SUBJECTS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 5);
}

// Generate choices for a round: correct + 3 decoys
function getChoices(correct, all) {
  const lang = i18n.lang();
  const others = all.filter(s => s.key !== correct.key).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [correct, ...others].sort(() => Math.random() - 0.5);
  return choices.map(s => ({
    key: s.key,
    label: s.nameKeys[lang] || s.nameKeys.en,
  }));
}

// =============================================
// GAME STATE
// =============================================
const ROUND_DURATION = 12000; // ms
let gameRounds = [];
let currentRoundIdx = 0;
let totalScore = 0;
let answers = [];
let roundStartTime = 0;
let roundTimer = null;
let animFrame = null;
let answered = false;

// Canvas pixelation engine
const canvas = document.getElementById("game-canvas");
const ctx2 = canvas.getContext("2d");
const offscreen = document.createElement("canvas");
offscreen.width = 400; offscreen.height = 400;
const offCtx = offscreen.getContext("2d");

function getPixelationLevel(elapsed, duration) {
  const MAX_BLOCK = 32, MIN_BLOCK = 1;
  const t = Math.max(0, Math.min(elapsed, duration));
  const progress = t / duration;
  const eased = 1 - Math.pow(1 - progress, 2);
  const block = MAX_BLOCK - Math.round(eased * (MAX_BLOCK - MIN_BLOCK));
  return Math.max(MIN_BLOCK, Math.min(MAX_BLOCK, block));
}

function getScore(elapsed, duration) {
  const t = Math.max(0, Math.min(elapsed, duration));
  const progress = t / duration;
  return Math.round(100 - progress * 90);
}

function drawPixelated(subject, blockSize) {
  offscreen.width = 400; offscreen.height = 400;
  subject.draw(offCtx, 400, 400);
  if (blockSize <= 1) {
    ctx2.drawImage(offscreen, 0, 0, 400, 400);
    return;
  }
  // Pixelate by downsampling then upsampling
  const small = document.createElement("canvas");
  const sw = Math.ceil(400 / blockSize), sh = Math.ceil(400 / blockSize);
  small.width = sw; small.height = sh;
  const sc = small.getContext("2d");
  sc.imageSmoothingEnabled = false;
  sc.drawImage(offscreen, 0, 0, sw, sh);
  ctx2.imageSmoothingEnabled = false;
  ctx2.clearRect(0, 0, 400, 400);
  ctx2.drawImage(small, 0, 0, 400, 400);
}

function startGame() {
  gameRounds = pickRounds();
  currentRoundIdx = 0;
  totalScore = 0;
  answers = [];
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("results-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  startRound();
}

function startRound() {
  answered = false;
  roundStartTime = performance.now();
  const subject = gameRounds[currentRoundIdx];
  const choices = getChoices(subject, SUBJECTS);

  // Update HUD
  document.getElementById("round-display").textContent = currentRoundIdx + 1;
  document.getElementById("score-display").textContent = totalScore;

  // Clear feedback
  const fb = document.getElementById("feedback");
  const sp = document.getElementById("score-pop");
  fb.className = "feedback";
  fb.textContent = "";
  sp.className = "score-pop";
  sp.textContent = "";

  // Build choices
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  choices.forEach(ch => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = ch.label;
    btn.onclick = () => onAnswer(ch.key === subject.key, btn, choices, subject.key);
    choicesEl.appendChild(btn);
  });

  // Start animation loop
  if (animFrame) cancelAnimationFrame(animFrame);
  function loop() {
    const elapsed = performance.now() - roundStartTime;
    const block = getPixelationLevel(elapsed, ROUND_DURATION);
    drawPixelated(subject, block);
    // Timer bar
    const pct = Math.max(0, 1 - elapsed / ROUND_DURATION);
    const bar = document.getElementById("timer-bar");
    bar.style.width = (pct * 100) + "%";
    bar.style.background = pct > 0.5 ? "#ffcc00" : pct > 0.25 ? "#ff8800" : "#ff4444";

    if (!answered && elapsed >= ROUND_DURATION) {
      onTimeout(subject.key);
      return;
    }
    if (!answered) {
      animFrame = requestAnimationFrame(loop);
    }
  }
  animFrame = requestAnimationFrame(loop);
}

function onAnswer(correct, btn, choices, correctKey) {
  if (answered) return;
  answered = true;
  if (animFrame) cancelAnimationFrame(animFrame);

  const elapsed = performance.now() - roundStartTime;
  const score = correct ? getScore(elapsed, ROUND_DURATION) : 0;

  // Highlight buttons
  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    const lang = i18n.lang();
    const bKey = SUBJECTS.find(s => (s.nameKeys[lang] || s.nameKeys.en) === b.textContent)?.key;
    if (bKey === correctKey) b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");

  // Feedback
  const fb = document.getElementById("feedback");
  fb.textContent = correct ? t("correct") : t("wrong");
  fb.className = "feedback show " + (correct ? "correct-fb" : "wrong-fb");

  // Score popup
  if (score > 0) {
    const sp = document.getElementById("score-pop");
    sp.textContent = "+" + score;
    void sp.offsetWidth;
    sp.className = "score-pop show";
  }

  totalScore += score;
  document.getElementById("score-display").textContent = totalScore;
  answers.push({ correct, score, elapsed, correctKey });

  // Draw final clear image
  drawPixelated(gameRounds[currentRoundIdx], 1);
  document.getElementById("timer-bar").style.width = "0%";

  setTimeout(() => nextRoundOrEnd(), 1600);
}

function onTimeout(correctKey) {
  if (answered) return;
  answered = true;

  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    const lang = i18n.lang();
    const bKey = SUBJECTS.find(s => (s.nameKeys[lang] || s.nameKeys.en) === b.textContent)?.key;
    if (bKey === correctKey) b.classList.add("correct");
  });

  const fb = document.getElementById("feedback");
  fb.textContent = t("timeout");
  fb.className = "feedback show timeout-fb";

  answers.push({ correct: false, score: 0, elapsed: ROUND_DURATION, correctKey });
  drawPixelated(gameRounds[currentRoundIdx], 1);
  document.getElementById("timer-bar").style.width = "0%";

  setTimeout(() => nextRoundOrEnd(), 1600);
}

function nextRoundOrEnd() {
  currentRoundIdx++;
  if (currentRoundIdx >= 5) {
    showResults();
  } else {
    startRound();
  }
}

function showResults() {
  document.getElementById("game-screen").style.display = "none";
  document.getElementById("results-screen").style.display = "block";
  document.getElementById("final-score-val").textContent = totalScore;

  const lang = i18n.lang();
  let rank, rankMsg;
  if (totalScore >= 450) { rank = "rankS"; }
  else if (totalScore >= 350) { rank = "rankA"; }
  else if (totalScore >= 200) { rank = "rankB"; }
  else { rank = "rankC"; }
  document.getElementById("result-msg").textContent = t(rank);

  const rows = document.getElementById("result-rows");
  rows.innerHTML = "";
  answers.forEach((a, i) => {
    const subject = gameRounds[i];
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML = `
      <span class="rr-icon">${a.correct ? "✅" : "❌"}</span>
      <span class="rr-subject">${subject.nameKeys[lang] || subject.nameKeys.en}</span>
      <span class="rr-pts">+${a.score} ${t("pts")}</span>
    `;
    rows.appendChild(row);
  });
}
