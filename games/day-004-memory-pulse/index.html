<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Pulse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    touch-action: manipulation;
    user-select: none;
  }
  h1 {
    font-size: 1.8rem;
    margin-top: 1.2rem;
    color: #ffcc00;
    text-shadow: 0 0 20px rgba(255,204,0,0.3);
    letter-spacing: 2px;
  }
  #info {
    margin: 0.6rem 0;
    font-size: 1rem;
    color: #aaa;
    text-align: center;
  }
  #round { color: #ffcc00; font-weight: bold; }
  #best { color: #888; }
  #tiles-wrap {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 1.5rem;
    padding: 16px;
  }
  .tile {
    width: clamp(100px, 28vw, 140px);
    height: clamp(100px, 28vw, 140px);
    border-radius: 18px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    opacity: 0.45;
    border: 2px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.15), transparent 60%);
    pointer-events: none;
  }
  .tile.flash {
    opacity: 1;
    transform: scale(1.08);
    box-shadow: 0 0 35px var(--glow), 0 0 80px var(--glow);
  }
  .tile.pressed {
    opacity: 0.9;
    transform: scale(0.95);
  }
  .tile.correct {
    opacity: 1;
    transform: scale(1.05);
    box-shadow: 0 0 25px var(--glow);
  }
  .tile.wrong {
    opacity: 1;
    animation: shake 0.4s;
    box-shadow: 0 0 40px #ff0000;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  #status {
    margin-top: 1.5rem;
    font-size: 1.2rem;
    min-height: 2rem;
    color: #ffcc00;
  }
  button {
    background: #1a1a3a;
    color: #ffcc00;
    border: 1px solid #ffcc0044;
    padding: 0.7rem 2rem;
    font-size: 1.1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  button:hover { background: #2a2a4a; border-color: #ffcc00; }
  #gameover-panel {
    display: none;
    text-align: center;
    margin-top: 1rem;
  }
  #gameover-panel .score {
    font-size: 2rem;
    color: #ffcc00;
    text-shadow: 0 0 20px rgba(255,204,0,0.4);
  }
  #gameover-panel .label { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }
  .back-bar{width:100%;background:#0a0a1a;padding:0.5rem 1rem;border-bottom:1px solid #333;}.back-bar a{color:#ffcc00;text-decoration:none;font-size:0.9rem;font-family:system-ui,sans-serif;}.back-bar a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="back-bar"><a href="/" data-i18n="back">← Back to Games</a></div>
<h1>🧠 MEMORY PULSE</h1>
<div id="info"><span data-i18n="round">Round:</span> <span id="round">0</span> · <span data-i18n="best">Best:</span> <span id="best">0</span></div>
<div id="tiles-wrap"></div>
<div id="status" data-i18n="tapStart">Tap Start to play</div>
<button id="start-btn" data-i18n="startBtn">Start</button>
<div id="gameover-panel">
  <div class="label" data-i18n="youReached">You reached</div>
  <div class="score">Round <span id="final-round">0</span></div>
  <button id="retry-btn" data-i18n="playAgain">Play Again</button>
</div>

<script src="/shared/i18n.js"></script>
<script>
const TRANSLATIONS = {
  de: {
    back: '← Zurück zu den Spielen',
    round: 'Runde:',
    best: 'Bestleistung:',
    tapStart: 'Start drücken zum Spielen',
    startBtn: 'Start',
    youReached: 'Du hast erreicht',
    playAgain: 'Nochmal spielen',
    watch: 'Schau zu...',
    yourTurn: 'Dein Zug!',
    nice: 'Super! 🎉',
  },
  en: {
    back: '← Back to Games',
    round: 'Round:',
    best: 'Best:',
    tapStart: 'Tap Start to play',
    startBtn: 'Start',
    youReached: 'You reached',
    playAgain: 'Play Again',
    watch: 'Watch...',
    yourTurn: 'Your turn!',
    nice: 'Nice! 🎉',
  },
  it: {
    back: '← Torna ai giochi',
    round: 'Turno:',
    best: 'Record:',
    tapStart: 'Tocca Start per giocare',
    startBtn: 'Start',
    youReached: 'Hai raggiunto',
    playAgain: 'Gioca ancora',
    watch: 'Guarda...',
    yourTurn: 'Tocca a te!',
    nice: 'Bravo! 🎉',
  },
  es: {
    back: '← Volver a los juegos',
    round: 'Ronda:',
    best: 'Mejor:',
    tapStart: 'Toca Inicio para jugar',
    startBtn: 'Iniciar',
    youReached: 'Llegaste a',
    playAgain: 'Jugar de nuevo',
    watch: 'Mira...',
    yourTurn: '¡Tu turno!',
    nice: '¡Bien! 🎉',
  },
  fr: {
    back: '← Retour aux jeux',
    round: 'Manche :',
    best: 'Meilleur :',
    tapStart: 'Appuyer sur Démarrer',
    startBtn: 'Démarrer',
    youReached: 'Vous avez atteint',
    playAgain: 'Rejouer',
    watch: 'Regardez...',
    yourTurn: 'À vous !',
    nice: 'Bien ! 🎉',
  },
};
const { t, lang, onLangChange, translatePage } = initI18n(TRANSLATIONS);
window.t = t;
window.onLangChange = onLangChange;
</script>

<script type="module">
import { createGame, addToSequence, getFlashDuration, handleInput, markInputReady, getTileColors } from './game.js';

const TILE_COUNT = 4;
const colors = getTileColors(TILE_COUNT);
const glows = ['#ff444488', '#44bb4488', '#4488ff88', '#ffaa0088'];

const tilesWrap = document.getElementById('tiles-wrap');
const roundEl = document.getElementById('round');
const bestEl = document.getElementById('best');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const gameoverPanel = document.getElementById('gameover-panel');
const finalRoundEl = document.getElementById('final-round');
const retryBtn = document.getElementById('retry-btn');

let game;
let bestRound = parseInt(localStorage.getItem('memoryPulseBest') || '0');
bestEl.textContent = bestRound;

// Create tiles
const tileEls = [];
for (let i = 0; i < TILE_COUNT; i++) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.style.background = colors[i];
  el.style.setProperty('--glow', glows[i]);
  el.dataset.index = i;
  tilesWrap.appendChild(el);
  tileEls.push(el);
}

function flashTile(index, duration) {
  return new Promise(resolve => {
    tileEls[index].classList.add('flash');
    setTimeout(() => {
      tileEls[index].classList.remove('flash');
      setTimeout(resolve, duration * 0.35);
    }, duration);
  });
}

async function playSequence() {
  statusEl.textContent = window.t('watch');
  const dur = getFlashDuration(game.round);
  await new Promise(r => setTimeout(r, 400));
  for (const idx of game.sequence) {
    await flashTile(idx, dur);
  }
  game = markInputReady(game);
  statusEl.textContent = window.t('yourTurn');
}

async function nextRound() {
  game = addToSequence(game);
  roundEl.textContent = game.round;
  await playSequence();
}

function onTileClick(e) {
  const el = e.currentTarget;
  const idx = parseInt(el.dataset.index);
  if (game.state !== 'input') return;

  game = handleInput(game, idx);

  if (game.state === 'gameover') {
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 400);
    statusEl.textContent = '';
    const reached = game.round - 1;
    if (reached > bestRound) {
      bestRound = reached;
      localStorage.setItem('memoryPulseBest', bestRound);
      bestEl.textContent = bestRound;
    }
    finalRoundEl.textContent = reached;
    gameoverPanel.style.display = 'block';
    startBtn.style.display = 'none';
    return;
  }

  // Correct tap feedback
  el.classList.add('correct');
  setTimeout(() => el.classList.remove('correct'), 200);

  if (game.state === 'roundcomplete') {
    statusEl.textContent = window.t('nice');
    setTimeout(() => nextRound(), 800);
  }
}

tileEls.forEach(el => {
  el.addEventListener('click', onTileClick);
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    el.classList.add('pressed');
  }, { passive: false });
  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    el.classList.remove('pressed');
    onTileClick({ currentTarget: el });
  }, { passive: false });
});

function startGame() {
  game = createGame(TILE_COUNT);
  game = { ...game, bestRound };
  gameoverPanel.style.display = 'none';
  startBtn.style.display = 'none';
  roundEl.textContent = '0';
  nextRound();
}

startBtn.addEventListener('click', startGame);
retryBtn.addEventListener('click', startGame);
</script>
</body>
</html>
