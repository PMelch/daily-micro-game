<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flow Grid 🌊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a1a;
    color: #eee;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .back-bar {
    width: 100%;
    background: #0a0a1a;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid #333;
  }
  .back-bar a {
    color: #ffcc00;
    text-decoration: none;
    font-size: 0.9rem;
    font-family: system-ui, sans-serif;
  }
  .back-bar a:hover { text-decoration: underline; }

  #game-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 540px;
    padding: 0.5rem 1rem 1rem;
  }

  h1 {
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 20px #4af;
    margin: 0.4rem 0 0.2rem;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 0.5rem;
  }

  /* HUD */
  .hud {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .hud-label {
    font-size: 0.6rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .hud-value {
    font-size: 1.1rem;
    font-weight: bold;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc0088;
  }
  #moves-count { color: #4af; text-shadow: 0 0 10px #4af8; }
  #flows-count { color: #4f4; text-shadow: 0 0 10px #4f48; }
  #fill-count { color: #f84; text-shadow: 0 0 10px #f848; }

  /* Level selector */
  .level-bar {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .level-btn {
    background: #1a1a2e;
    border: 1px solid #333;
    color: #aaa;
    padding: 3px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.15s;
  }
  .level-btn:hover { border-color: #4af; color: #4af; }
  .level-btn.active { border-color: #ffcc00; color: #ffcc00; background: #1a1a00; }

  /* Grid */
  #grid-wrapper {
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #grid-canvas {
    display: block;
    border-radius: 8px;
    box-shadow: 0 0 30px #4af4, 0 0 60px #4af2;
  }

  /* Instructions */
  .instructions {
    margin-top: 0.6rem;
    font-size: 0.72rem;
    color: #555;
    text-align: center;
    line-height: 1.6;
  }

  /* Win overlay */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  #win-overlay.show { display: flex; }
  .win-title {
    font-size: 2.5rem;
    color: #ffcc00;
    text-shadow: 0 0 30px #ffcc00;
    animation: pulse 0.8s ease infinite alternate;
  }
  .win-sub {
    font-size: 1rem;
    color: #aaa;
  }
  .win-stats {
    display: flex;
    gap: 2rem;
    margin: 0.5rem 0;
  }
  .win-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .win-stat-val {
    font-size: 1.8rem;
    font-weight: bold;
  }
  .win-stat-lbl {
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn {
    background: #0a0a1a;
    border: 2px solid #4af;
    color: #4af;
    padding: 0.6rem 1.8rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn:hover { background: #4af; color: #000; box-shadow: 0 0 20px #4af; }
  .btn-gold { border-color: #ffcc00; color: #ffcc00; }
  .btn-gold:hover { background: #ffcc00; color: #000; box-shadow: 0 0 20px #ffcc00; }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  /* Mobile adjustments */
  @media (max-width: 400px) {
    h1 { font-size: 1.3rem; }
    #game-container { padding: 0.3rem 0.5rem 0.5rem; }
  }
</style>
</head>
<body>

<div class="back-bar"><a href="/">← <span data-i18n="back">Zurück</span></a></div>

<div id="game-container">
  <h1>🌊 FLOW GRID</h1>
  <p class="subtitle" data-i18n="subtitle">Verbinde die Farben – fülle das gesamte Raster!</p>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label" data-i18n="level">Level</span>
      <span class="hud-value" id="level-display">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label" data-i18n="moves">Züge</span>
      <span class="hud-value" id="moves-count">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label" data-i18n="flows">Flows</span>
      <span class="hud-value" id="flows-count">0/0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label" data-i18n="fill">Füllung</span>
      <span class="hud-value" id="fill-count">0%</span>
    </div>
  </div>

  <div class="level-bar" id="level-bar"></div>

  <div id="grid-wrapper">
    <canvas id="grid-canvas"></canvas>
  </div>

  <p class="instructions" data-i18n="instructions">
    Ziehe von einem Punkt zum anderen um die Rohre zu verbinden.<br>
    Alle Zellen müssen gefüllt sein!
  </p>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
  <div class="win-title" data-i18n="winTitle">🎉 GELÖST!</div>
  <div class="win-sub" id="win-sub-text"></div>
  <div class="win-stats">
    <div class="win-stat">
      <span class="win-stat-val" id="win-moves" style="color:#4af">–</span>
      <span class="win-stat-lbl" data-i18n="moves">Züge</span>
    </div>
    <div class="win-stat">
      <span class="win-stat-val" id="win-rating" style="color:#ffcc00">–</span>
      <span class="win-stat-lbl" data-i18n="rating">Bewertung</span>
    </div>
  </div>
  <div style="display:flex;gap:1rem;">
    <button class="btn btn-gold" id="btn-next" data-i18n="nextLevel">Nächstes Level</button>
    <button class="btn" id="btn-replay" data-i18n="retry">Nochmal</button>
  </div>
</div>

<script src="/shared/i18n.js"></script>
<script>
const TRANSLATIONS = {

    level: 'Niveau',
    moves: 'Coups',
    flows: 'Flux',
    fill: 'Remplissage',
    instructions: 'Glisse d\'un point coloré à son jumeau.\nToutes les cellules doivent être remplies !',
    winTitle: '🎉 RÉSOLU !',
    winSub: 'Niveau {n} terminé !',
    nextLevel: 'Niveau suivant',

    rating: 'Note',
    perfect: '⭐⭐⭐ Parfait !',
    great: '⭐⭐ Super !',
    good: '⭐ Résolu !',
  },
  it: {
    back: 'Torna ai giochi',
    subtitle: 'Collega i colori – riempi tutta la griglia!',
    level: 'Livello',
    moves: 'Mosse',
    flows: 'Flussi',
    fill: 'Riempimento',
    instructions: 'Trascina da un punto colorato al suo gemello.\nTutte le celle devono essere riempite!',
    winTitle: '🎉 RISOLTO!',
    winSub: 'Livello {n} completato!',
    nextLevel: 'Livello successivo',
    retry: 'Riprova',
    rating: 'Valutazione',
    perfect: '⭐⭐⭐ Perfetto!',
    great: '⭐⭐ Ottimo!',
    good: '⭐ Risolto!',
  },
  es: {
    back: 'Volver a los juegos',
    subtitle: '¡Conecta los colores y llena toda la cuadrícula!',
    level: 'Nivel',
    moves: 'Movimientos',
    flows: 'Flujos',
    fill: 'Relleno',
    instructions: 'Arrastra desde un punto de color hasta su gemelo.\n¡Todas las celdas deben estar llenas!',
    winTitle: '🎉 ¡RESUELTO!',
    winSub: '¡Nivel {n} completado!',
    nextLevel: 'Siguiente nivel',
    retry: 'Reintentar',
    rating: 'Puntuación',
    perfect: '⭐⭐⭐ ¡Perfecto!',
    great: '⭐⭐ ¡Genial!',
    good: '⭐ ¡Resuelto!',
  },
};

const { t, onLangChange, translatePage } = initI18n(TRANSLATIONS);

// ─── Puzzles ────────────────────────────────────────────────────────────────
const PUZZLES = [
  // Level 1: 5x5 Easy (4 colors)
  { size: 5, dotPairs: [
    ['#e74c3c', [0,0], [4,4]],
    ['#3498db', [0,4], [4,0]],
    ['#2ecc71', [0,2], [3,4]],
    ['#f39c12', [2,0], [4,2]],
  ]},
  // Level 2: 5x5 Medium (5 colors)
  { size: 5, dotPairs: [
    ['#e74c3c', [0,0], [4,2]],
    ['#3498db', [0,3], [4,4]],
    ['#2ecc71', [0,1], [2,4]],
    ['#f39c12', [1,0], [4,0]],
    ['#9b59b6', [2,2], [4,3]],
  ]},
  // Level 3: 6x6 Medium (5 colors)
  { size: 6, dotPairs: [
    ['#e74c3c', [0,0], [5,5]],
    ['#3498db', [0,5], [5,0]],
    ['#2ecc71', [0,3], [3,5]],
    ['#f39c12', [2,0], [5,3]],
    ['#9b59b6', [1,2], [4,3]],
  ]},
  // Level 4: 6x6 Hard (6 colors)
  { size: 6, dotPairs: [
    ['#e74c3c', [0,1], [5,4]],
    ['#3498db', [0,4], [5,1]],
    ['#2ecc71', [0,0], [3,3]],
    ['#f39c12', [1,5], [4,2]],
    ['#9b59b6', [2,1], [5,5]],
    ['#1abc9c', [0,3], [3,0]],
  ]},
  // Level 5: 7x7 Hard (6 colors)
  { size: 7, dotPairs: [
    ['#e74c3c', [0,0], [6,6]],
    ['#3498db', [0,6], [6,0]],
    ['#2ecc71', [0,3], [6,3]],
    ['#f39c12', [2,0], [2,6]],
    ['#9b59b6', [4,0], [4,6]],
    ['#1abc9c', [1,2], [5,4]],
  ]},
  // Level 6: 7x7 Expert (7 colors)
  { size: 7, dotPairs: [
    ['#e74c3c', [0,0], [4,4]],
    ['#3498db', [0,6], [3,2]],
    ['#2ecc71', [1,1], [6,5]],
    ['#f39c12', [0,3], [6,0]],
    ['#9b59b6', [2,5], [5,1]],
    ['#1abc9c', [0,5], [6,3]],
    ['#e67e22', [3,0], [6,6]],
  ]},
  // Level 7: 8x8 Expert (7 colors)
  { size: 8, dotPairs: [
    ['#e74c3c', [0,0], [7,7]],
    ['#3498db', [0,7], [7,0]],
    ['#2ecc71', [0,4], [4,7]],
    ['#f39c12', [3,0], [7,4]],
    ['#9b59b6', [1,2], [6,5]],
    ['#1abc9c', [0,2], [2,6]],
    ['#e67e22', [5,1], [7,6]],
  ]},
  // Level 8: 8x8 Expert (8 colors)
  { size: 8, dotPairs: [
    ['#e74c3c', [0,1], [7,6]],
    ['#3498db', [0,6], [7,1]],
    ['#2ecc71', [0,3], [5,7]],
    ['#f39c12', [2,0], [7,3]],
    ['#9b59b6', [1,4], [6,2]],
    ['#1abc9c', [3,7], [7,5]],
    ['#e67e22', [0,0], [4,4]],
    ['#e91e63', [4,0], [7,7]],
  ]},
];

// ─── Game State ─────────────────────────────────────────────────────────────
let currentLevel = 0;
let puzzle = null;
let grid = null;
let paths = {};     // color → [[r,c], ...]
let completed = {}; // color → bool
let moves = 0;
let dragging = null; // { color, fromDot }
let cellSize = 60;

const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');

// ─── Level Setup ─────────────────────────────────────────────────────────────
function loadLevel(idx) {
  currentLevel = idx;
  puzzle = PUZZLES[idx];
  const size = puzzle.size;

  grid = Array.from({ length: size }, () => Array(size).fill(null));
  paths = {};
  completed = {};
  moves = 0;

  // Place dots on grid
  for (const [color, start, end] of puzzle.dotPairs) {
    grid[start[0]][start[1]] = { color, isDot: true };
    grid[end[0]][end[1]] = { color, isDot: true };
    paths[color] = [];
    completed[color] = false;
  }

  // Calculate cell size
  const maxW = Math.min(480, window.innerWidth - 32);
  const maxH = Math.min(480, window.innerHeight - 260);
  cellSize = Math.floor(Math.min(maxW, maxH) / size);
  canvas.width = cellSize * size;
  canvas.height = cellSize * size;

  document.getElementById('level-display').textContent = idx + 1;
  updateHUD();
  render();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('moves-count').textContent = moves;

  const total = puzzle.dotPairs.length;
  const done = Object.values(completed).filter(Boolean).length;
  document.getElementById('flows-count').textContent = `${done}/${total}`;

  const size = puzzle.size;
  let filled = 0;
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      if (grid[r][c] !== null) filled++;
  const pct = Math.round(filled / (size * size) * 100);
  document.getElementById('fill-count').textContent = `${pct}%`;
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const size = puzzle.size;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background grid
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#1e2a3a';
  ctx.lineWidth = 1;
  for (let i = 0; i <= size; i++) {
    ctx.beginPath();
    ctx.moveTo(i * cellSize, 0);
    ctx.lineTo(i * cellSize, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * cellSize);
    ctx.lineTo(canvas.width, i * cellSize);
    ctx.stroke();
  }

  // Draw paths (pipes)
  for (const [color, , ] of puzzle.dotPairs) {
    const path = paths[color];
    if (!path || path.length < 2) continue;

    ctx.strokeStyle = color;
    ctx.lineWidth = cellSize * 0.38;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = completed[color] ? 16 : 8;
    ctx.globalAlpha = completed[color] ? 1.0 : 0.85;

    ctx.beginPath();
    const [r0, c0] = path[0];
    ctx.moveTo(c0 * cellSize + cellSize / 2, r0 * cellSize + cellSize / 2);
    for (let i = 1; i < path.length; i++) {
      const [r, c] = path[i];
      ctx.lineTo(c * cellSize + cellSize / 2, r * cellSize + cellSize / 2);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Draw dots
  for (const [color, start, end] of puzzle.dotPairs) {
    drawDot(start[0], start[1], color);
    drawDot(end[0], end[1], color);
  }
}

function drawDot(row, col, color) {
  const x = col * cellSize + cellSize / 2;
  const y = row * cellSize + cellSize / 2;
  const r = cellSize * 0.28;

  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Ring
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, r + 2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ─── Input Handling ──────────────────────────────────────────────────────────
function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  const col = Math.floor(x / cellSize);
  const row = Math.floor(y / cellSize);
  if (row < 0 || row >= puzzle.size || col < 0 || col >= puzzle.size) return null;
  return [row, col];
}

function startDrag(e) {
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if (!cell) return;
  const [row, col] = cell;

  // Must start from a dot
  const gridCell = grid[row][col];
  if (!gridCell || !gridCell.isDot) {
    // Check if cell has a path color and restart that path from this point
    if (gridCell && gridCell.color) {
      const color = gridCell.color;
      // Find if this is a path cell (not a dot) and restart
      clearPathFromCell(color, row, col);
      dragging = { color };
    }
    return;
  }

  const color = gridCell.color;

  // Clear existing path for this color
  clearPath(color);
  dragging = { color };

  // Start path at this dot
  paths[color] = [[row, col]];
  completed[color] = false;

  moves++;
  updateHUD();
  render();
}

function clearPath(color) {
  const path = paths[color];
  if (!path) return;
  for (const [r, c] of path) {
    if (grid[r][c] && !grid[r][c].isDot) {
      grid[r][c] = null;
    }
  }
  paths[color] = [];
  completed[color] = false;
}

function clearPathFromCell(color, row, col) {
  const path = paths[color];
  if (!path) return;
  const idx = path.findIndex(([r, c]) => r === row && c === col);
  if (idx < 0) return;
  // Remove everything after idx
  const removed = path.splice(idx + 1);
  for (const [r, c] of removed) {
    if (grid[r][c] && !grid[r][c].isDot) {
      grid[r][c] = null;
    }
  }
  completed[color] = false;
}

function moveDrag(e) {
  e.preventDefault();
  if (!dragging) return;

  const cell = getCellFromEvent(e);
  if (!cell) return;
  const [row, col] = cell;

  const path = paths[dragging.color];
  if (!path || path.length === 0) return;

  const [lastRow, lastCol] = path[path.length - 1];

  // Already at this cell
  if (row === lastRow && col === lastCol) return;

  // Check if we're backtracking (step back in path)
  if (path.length >= 2) {
    const [prevRow, prevCol] = path[path.length - 2];
    if (row === prevRow && col === prevCol) {
      // Remove last cell
      const [removedRow, removedCol] = path.pop();
      if (grid[removedRow][removedCol] && !grid[removedRow][removedCol].isDot) {
        grid[removedRow][removedCol] = null;
      }
      completed[dragging.color] = false;
      updateHUD();
      render();
      return;
    }
  }

  // Check adjacency
  const dr = Math.abs(row - lastRow);
  const dc = Math.abs(col - lastCol);
  if (dr + dc !== 1) return;

  // Check target cell
  const targetCell = grid[row][col];

  // Can place on empty cell
  if (targetCell === null) {
    path.push([row, col]);
    grid[row][col] = { color: dragging.color, isDot: false };
    completed[dragging.color] = false;
    updateHUD();
    render();
    return;
  }

  // Can complete flow by reaching the matching endpoint dot
  if (targetCell.isDot && targetCell.color === dragging.color) {
    path.push([row, col]);
    completed[dragging.color] = true;
    updateHUD();
    render();
    checkWinCondition();
    dragging = null;
    return;
  }

  // If we hit our own path (not a dot), allow if it's somewhere behind — handled by backtrack above
  // If hitting another color path, stop
  return;
}

function endDrag(e) {
  dragging = null;
}

function checkWinCondition() {
  const size = puzzle.size;
  // Check all flows complete
  for (const [color] of puzzle.dotPairs) {
    if (!completed[color]) return;
  }
  // Check grid filled
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (grid[r][c] === null) return;
    }
  }
  // Won!
  setTimeout(showWin, 300);
}

function showWin() {
  const overlay = document.getElementById('win-overlay');
  document.getElementById('win-moves').textContent = moves;

  // Rating based on moves vs puzzle size
  const size = puzzle.size;
  const par = size * size * 0.8; // rough par
  let rating;
  if (moves <= par * 0.8) rating = t('perfect');
  else if (moves <= par) rating = t('great');
  else rating = t('good');

  document.getElementById('win-rating').textContent = rating;
  document.getElementById('win-sub-text').textContent =
    t('winSub').replace('{n}', currentLevel + 1);

  overlay.classList.add('show');
}

// ─── Event Listeners ─────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', startDrag);
canvas.addEventListener('mousemove', moveDrag);
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);
canvas.addEventListener('touchstart', startDrag, { passive: false });
canvas.addEventListener('touchmove', moveDrag, { passive: false });
canvas.addEventListener('touchend', endDrag);

document.getElementById('btn-next').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  loadLevel((currentLevel + 1) % PUZZLES.length);
});
document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  loadLevel(currentLevel);
});

// Level buttons
const levelBar = document.getElementById('level-bar');
PUZZLES.forEach((_, i) => {
  const btn = document.createElement('button');
  btn.className = 'level-btn' + (i === 0 ? ' active' : '');
  btn.textContent = `${i + 1}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLevel(i);
  });
  levelBar.appendChild(btn);
});

// Update level button active state on load
function updateLevelButtons() {
  document.querySelectorAll('.level-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentLevel);
  });
}

// Re-translate dynamic text on lang change
onLangChange(() => {
  translatePage();
});

// Handle resize
window.addEventListener('resize', () => {
  if (puzzle) loadLevel(currentLevel);
});

// Start!
loadLevel(0);
</script>
</body>
</html>
