<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Micro Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #ccc; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a3e, #2d1b69); padding: 2rem; text-align: center; border-bottom: 2px solid #333; }
  .header h1 { color: #ffcc00; font-size: 2rem; margin-bottom: 0.3rem; }
  .header p { color: #aaa; font-size: 0.95rem; }
  .stats { display: flex; gap: 2rem; justify-content: center; margin-top: 1rem; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: bold; color: #ffcc00; }
  .stat-label { font-size: 0.8rem; color: #888; }
  .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  .empty { text-align: center; padding: 4rem 1rem; color: #666; }
  .empty h2 { color: #888; margin-bottom: 0.5rem; }

  /* Tag filter bar */
  .filter-bar { margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .filter-label { color: #888; font-size: 0.85rem; margin-right: 0.25rem; }
  .tag-btn { background: #1a1a2e; border: 1px solid #444; color: #aaa; padding: 0.35rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
  .tag-btn:hover { border-color: #ffcc00; color: #ffcc00; }
  .tag-btn.active { background: #ffcc00; color: #000; border-color: #ffcc00; font-weight: 600; }

  /* Game cards */
  .game-card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s; }
  .game-card:hover { border-color: #ffcc00; }
  .game-card h2 { color: #fff; font-size: 1.2rem; margin-bottom: 0.3rem; }
  .game-card .meta { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .game-card .desc { color: #aaa; margin-bottom: 0.75rem; line-height: 1.5; }
  .game-card .details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; }
  .game-card .details dt { color: #888; }
  .game-card .details dd { color: #bbb; }
  .game-card .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
  .game-tag { background: #2a2a4a; color: #aaa; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }
  .game-card .actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .play-btn { background: #ffcc00; color: #000; text-decoration: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
  .play-btn:hover { background: #ffd633; }
  .stars { display: flex; gap: 2px; }
  .star { cursor: pointer; font-size: 1.4rem; color: #444; transition: color 0.15s; user-select: none; }
  .star.active { color: #ffcc00; }
  .rating-info { color: #888; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="header">
  <h1>🎮 Daily Micro Games</h1>
  <p>A new game every day — play, rate, enjoy</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-games">0</div><div class="stat-label">Games</div></div>
    <div class="stat"><div class="stat-num" id="total-ratings">0</div><div class="stat-label">Ratings</div></div>
  </div>
</div>
<div class="container">
  <div class="filter-bar" id="filter-bar" style="display:none">
    <span class="filter-label">Filter:</span>
  </div>
  <div id="games-list">
    <div class="empty"><h2>No games yet</h2><p>The first game drops tomorrow morning! 🌅</p></div>
  </div>
</div>
<script>
let allGames = [];
let activeTags = new Set();

async function load() {
  const res = await fetch('/api/games');
  allGames = await res.json();
  document.getElementById('total-games').textContent = allGames.length;
  document.getElementById('total-ratings').textContent = allGames.reduce((s, g) => s + (g.ratings?.length || 0), 0);
  buildFilters();
  render();
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  const allTags = [...new Set(allGames.flatMap(g => g.tags || []))].sort();
  if (allTags.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  // Keep the label, remove old buttons
  bar.querySelectorAll('.tag-btn').forEach(b => b.remove());
  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTags.has(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => { activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag); buildFilters(); render(); };
    bar.appendChild(btn);
  });
}

function render() {
  const container = document.getElementById('games-list');
  let games = allGames;
  if (activeTags.size > 0) {
    games = games.filter(g => (g.tags || []).some(t => activeTags.has(t)));
  }
  games.sort((a, b) => b.date.localeCompare(a.date));

  if (games.length === 0 && allGames.length === 0) {
    container.innerHTML = '<div class="empty"><h2>No games yet</h2><p>The first game drops tomorrow morning! 🌅</p></div>';
    return;
  }
  if (games.length === 0) {
    container.innerHTML = '<div class="empty"><h2>No games match these tags</h2></div>';
    return;
  }

  container.innerHTML = games.map(g => `
    <div class="game-card">
      <h2>${esc(g.name)}</h2>
      <div class="meta">Day ${g.id.match(/day-(\d+)/)?.[1] || '?'} · ${g.date}${g.averageRating ? ` · ⭐ ${g.averageRating.toFixed(1)} (${g.ratings.length})` : ''}</div>
      <div class="desc">${esc(g.description)}</div>
      ${g.howToPlay || g.whyFun ? `<div class="details">
        ${g.howToPlay ? `<dt>🕹️ How to play</dt><dd>${esc(g.howToPlay)}</dd>` : ''}
        ${g.whyFun ? `<dt>✨ Why it's fun</dt><dd>${esc(g.whyFun)}</dd>` : ''}
      </div>` : ''}
      ${(g.tags||[]).length ? `<div class="tags">${g.tags.map(t => `<span class="game-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="actions">
        <a class="play-btn" href="/games/${g.id}/">▶ Play</a>
        <div class="stars" data-game="${g.id}">
          ${[1,2,3,4,5].map(n => `<span class="star${g.averageRating && n <= Math.round(g.averageRating) ? ' active' : ''}" data-rating="${n}">★</span>`).join('')}
        </div>
        <span class="rating-info">${g.ratings?.length ? g.ratings.length + ' rating' + (g.ratings.length > 1 ? 's' : '') : 'Not rated yet'}</span>
      </div>
    </div>
  `).join('');

  // Star hover + click
  container.querySelectorAll('.stars').forEach(el => {
    const stars = el.querySelectorAll('.star');
    stars.forEach(star => {
      star.addEventListener('mouseenter', () => {
        const r = +star.dataset.rating;
        stars.forEach(s => s.style.color = +s.dataset.rating <= r ? '#ffcc00' : '#444');
      });
      star.addEventListener('click', async () => {
        await fetch(`/api/games/${el.dataset.game}/rate`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating: +star.dataset.rating })
        });
        load();
      });
    });
    el.addEventListener('mouseleave', () => stars.forEach(s => s.style.color = ''));
  });
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
load();
</script>
</body>
</html>
