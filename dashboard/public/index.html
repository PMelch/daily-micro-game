<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Micro Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #ccc; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a3e, #2d1b69); padding: 2rem; text-align: center; border-bottom: 2px solid #333; position: relative; }
  .header h1 { color: #ffcc00; font-size: 2rem; margin-bottom: 0.3rem; }
  .header p { color: #aaa; font-size: 0.95rem; }
  .stats { display: flex; gap: 2rem; justify-content: center; margin-top: 1rem; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: bold; color: #ffcc00; }
  .stat-label { font-size: 0.8rem; color: #888; }
  .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  .empty { text-align: center; padding: 4rem 1rem; color: #666; }
  .empty h2 { color: #888; margin-bottom: 0.5rem; }
  .game-card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s; }
  .game-card:hover { border-color: #ffcc00; }
  .game-card h2 { color: #fff; font-size: 1.2rem; margin-bottom: 0.3rem; }
  .game-card .meta { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .game-card .desc { color: #aaa; margin-bottom: 1rem; }
  .game-card .actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .play-btn { background: #ffcc00; color: #000; text-decoration: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
  .play-btn:hover { background: #ffd633; }
  .stars { display: flex; gap: 2px; }
  .star { cursor: pointer; font-size: 1.4rem; color: #444; transition: color 0.15s; }
  .star.active, .star:hover, .star:hover ~ .star { color: #ffcc00; }
  .rating-info { color: #888; font-size: 0.85rem; }
  .stars:hover .star { color: #444; }
  .stars:hover .star:hover, .stars:hover .star:hover ~ .star-before { color: #ffcc00; }
  .lang-selector { position: absolute; top: 1rem; left: 1rem; display: flex; gap: 4px; }
  .lang-btn { background: none; border: 1px solid transparent; border-radius: 4px; cursor: pointer; font-size: 1.2rem; padding: 3px 6px; opacity: 0.5; transition: opacity 0.15s; }
  .lang-btn.active { opacity: 1; border-color: #ffcc00; }
  .lang-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="header">
  <div class="lang-selector" id="lang-selector"></div>
  <h1>🎮 Daily Micro Games</h1>
  <p id="header-sub">A new game every day — play, rate, enjoy</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-games">0</div><div class="stat-label" id="label-games">Games</div></div>
    <div class="stat"><div class="stat-num" id="total-ratings">0</div><div class="stat-label" id="label-ratings">Ratings</div></div>
  </div>
</div>
<div class="container" id="games-list">
  <div class="empty"><h2>No games yet</h2><p>The first game drops tomorrow morning! 🌅</p></div>
</div>
<script>
const LANGS = ['de','en','fr','it','es'];
const LANG_FLAGS = { de:'🇩🇪', en:'🇬🇧', fr:'🇫🇷', it:'🇮🇹', es:'🇪🇸' };
const UI = {
  de: { sub:'Jeden Tag ein neues Spiel — spielen, bewerten, genießen', games:'Spiele', ratings:'Bewertungen', play:'▶ Spielen', notRated:'Noch nicht bewertet', noGames:'Noch keine Spiele', noGamesSub:'Das erste Spiel kommt morgen früh! 🌅', rating:'Bewertung', ratingPlural:'Bewertungen' },
  en: { sub:'A new game every day — play, rate, enjoy', games:'Games', ratings:'Ratings', play:'▶ Play', notRated:'Not rated yet', noGames:'No games yet', noGamesSub:'The first game drops tomorrow morning! 🌅', rating:'rating', ratingPlural:'ratings' },
  fr: { sub:'Un nouveau jeu chaque jour — joue, note, profite', games:'Jeux', ratings:'Notes', play:'▶ Jouer', notRated:'Pas encore noté', noGames:'Pas encore de jeux', noGamesSub:'Le premier jeu arrive demain matin ! 🌅', rating:'note', ratingPlural:'notes' },
  it: { sub:'Un nuovo gioco ogni giorno — gioca, vota, divertiti', games:'Giochi', ratings:'Voti', play:'▶ Gioca', notRated:'Non ancora votato', noGames:'Nessun gioco ancora', noGamesSub:'Il primo gioco arriva domani mattina! 🌅', rating:'voto', ratingPlural:'voti' },
  es: { sub:'Un juego nuevo cada día — juega, califica, disfruta', games:'Juegos', ratings:'Calificaciones', play:'▶ Jugar', notRated:'Sin calificar', noGames:'Aún no hay juegos', noGamesSub:'¡El primer juego llega mañana! 🌅', rating:'calificación', ratingPlural:'calificaciones' },
};

let currentLang = 'en';
try {
  const stored = localStorage.getItem('dg-lang');
  if (stored && LANGS.includes(stored)) currentLang = stored;
  else {
    const nav = (navigator.language || '').slice(0,2).toLowerCase();
    if (LANGS.includes(nav)) currentLang = nav;
  }
} catch {}

function setLang(l) {
  currentLang = l;
  try { localStorage.setItem('dg-lang', l); } catch {}
  document.documentElement.lang = l;
  updateLangButtons();
  updateUIStrings();
  load();
}

function updateLangButtons() {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function updateUIStrings() {
  const u = UI[currentLang] || UI.en;
  document.getElementById('header-sub').textContent = u.sub;
  document.getElementById('label-games').textContent = u.games;
  document.getElementById('label-ratings').textContent = u.ratings;
}

// Build lang selector
const sel = document.getElementById('lang-selector');
LANGS.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (l === currentLang ? ' active' : '');
  btn.dataset.lang = l;
  btn.textContent = LANG_FLAGS[l];
  btn.title = l.toUpperCase();
  btn.addEventListener('click', () => setLang(l));
  sel.appendChild(btn);
});

function localized(g, field) {
  const key = field + '_' + currentLang;
  return g[key] || g[field] || '';
}

async function load() {
  const res = await fetch('/api/games');
  const games = await res.json();
  const container = document.getElementById('games-list');
  const u = UI[currentLang] || UI.en;

  document.getElementById('total-games').textContent = games.length;
  document.getElementById('total-ratings').textContent = games.reduce((s, g) => s + (g.ratings?.length || 0), 0);

  if (games.length === 0) {
    container.innerHTML = `<div class="empty"><h2>${u.noGames}</h2><p>${u.noGamesSub}</p></div>`;
    return;
  }

  games.sort((a, b) => b.date.localeCompare(a.date));

  container.innerHTML = games.map(g => {
    const name = localized(g, 'name');
    const desc = localized(g, 'description');
    const rCount = g.ratings?.length || 0;
    const rText = rCount ? `${rCount} ${rCount > 1 ? u.ratingPlural : u.rating}` : u.notRated;
    return `
    <div class="game-card">
      <h2>${esc(name)}</h2>
      <div class="meta">Day ${g.id.split('-')[1] || '?'} · ${g.date}${g.averageRating ? ` · ⭐ ${g.averageRating.toFixed(1)} (${rCount})` : ''}</div>
      <div class="desc">${esc(desc)}</div>
      <div class="actions">
        <a class="play-btn" href="/games/${g.id}/">${u.play}</a>
        <div class="stars" data-game="${g.id}">
          ${[1,2,3,4,5].map(n => `<span class="star${g.averageRating && n <= Math.round(g.averageRating) ? ' active' : ''}" data-rating="${n}">★</span>`).join('')}
        </div>
        <span class="rating-info">${rText}</span>
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll('.stars').forEach(el => {
    el.querySelectorAll('.star').forEach(star => {
      star.addEventListener('mouseenter', () => {
        const r = +star.dataset.rating;
        el.querySelectorAll('.star').forEach(s => s.style.color = +s.dataset.rating <= r ? '#ffcc00' : '#444');
      });
      star.addEventListener('click', async () => {
        await fetch(`/api/games/${el.dataset.game}/rate`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating: +star.dataset.rating })
        });
        load();
      });
    });
    el.addEventListener('mouseleave', () => {
      el.querySelectorAll('.star').forEach(s => s.style.color = '');
    });
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
document.documentElement.lang = currentLang;
updateUIStrings();
load();
</script>
</body>
</html>
